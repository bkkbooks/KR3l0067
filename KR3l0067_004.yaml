body:
  text: 清波雜志卷第四借書一欷還書一欷後訛為癡殊失忠厚氣象書非天降地出必因人得之得而祕之自示不廣人亦豈肯以未見者相假唐杜暹家書末自題云清俸買來手自校子孫讀之知聖道鬻及借人為不孝鬻為不孝可也借為不孝過矣然輝手抄書前後遺失亦多未免往來于懷因讀唐子西庚失茶具說釋然不復芥蒂其說曰吾家失茶具戒婦勿求婦曰何也吾應之曰彼竊者必其所好也心之所好則思得之懼吾靳之不豫也而竊之則斯人也得其所好矣得其所好則寶之懼其泄而祕之懼其壞而安置之則是物也得其所託矣人得其所好物得其所託復何言哉婦曰嘻是烏得不貧輝亦云聚而必散物理之常父兄藏書雖恐子弟不讀讀無所成猶勝腐爛篋笥旋致蠧魚之變陳亞少卿藏書千卷名畫一千餘軸晚年復得華亭雙鶴及怪石異花作詩戒其後曰滿室圖書雜典墳華亭仙客岱雲根他年若不和根賣便是吾家好子孫亞死悉歸他人造請不避寒暑誠可譏誚若下位事上官朝造夕謁其可不循等威之分若初非隸屬但恃雅素趑趄日進懷漫剌俯首樊知客輩固多不自愛重者寧使訝其不來莫使厭其不去是為知言放臣逐客一旦棄置逺外其憂悲憔悴之歎發於詩什特為酸楚極有不能自遣者滕子京守巴陵修嶽陽樓或贊其落成答以落甚成只待憑欄大慟數場閔已傷志固君子所不免亦豈至是哉張藝叟元豐間從髙遵𥙿辟環慶出師失律且為轉運使李察訐其詩語謫監郴州酒舟行以二小詞題嶽陽樓木葉下君山空水漫漫十分斟酒斂芳顔不是渭城西去客休唱陽關醉袖撫危欄天淡雲間何人此路得生還回首夕陽紅盡處應是長安樓上久踟蹰地逺身孤擬將憔悴弔三閭自是長安日下影流落江湖爛醉且消除不醉何如又看瞑色滿平蕪試問寒沙新到鴈應有來書亦豈無去國流離之思殊覺婉而不傷也藝叟遷流逺適歷時三涉水六過州十有五自汴抵郴所至留連南京孫莘老揚州孔周翰泗州蔣穎叔江寧王介甫黃州蘇子瞻衡州劉貢父皆相遇焉說詩攬勝無復行役之勞未離江寧日因送人入京及同士子數輩飲餞游清涼寺抵暮回屬營妓數人同舟宛轉趣賞心亭未至聞亭上有散樂聲逼而詢之乃府公訝妓籍踈索俾申劾之既見共載野服披猖但一笑而止今日放臣逐客容如是乎一假勝槩宜入畫圖府公陳和叔也碧雲騢者廄馬也莊憲太后臨朝初以賜荆王王惡其旋毛太后知之曰旋毛能害人耶吾不信留以備上間為御馬弟一以其吻肉色碧如霞片故云丗以旋毛為醜此以旋毛為貴雖貴矣病可去乎梅聖俞不得志於諸公間乃借此名著書一卷詆譏慶曆巨公後葉石林於避暑録嘗辦乃襄陽魏泰所著嫁之聖俞其略謂萬有一不至猶當為賢者諱蓋亦未免置疑邵公濟康節孫也亦引聖俞聞范文正公訃詩云一出婁更郡人皆望酒壺俗情難可學秦記向來無貧賤嘗甘分崇髙不解諛雖然門館隔泣與衆人殊謂為郡以酒恱人樂奏記納諛豈所以論文正者以是又疑真出於聖俞也輝舊得碔􅭏録一編亦若碧雲騢専暴人之短為人借去不歸王荆公初見晏元獻元獻熟視無他語但云能容於物物亦容矣荆公唯唯退而思之此語其有所出或自為之言後識者謂荆公平日所短正在于此何元獻逆知其然耶先人性坦夷遇事即發無一毫顧避親戚有初除從官來見首詢薦何人自代答以張安國先人曰不易薦拔寒素狀元及第榮進素定何待薦也退而先人復言且如擇壻但取寒士度其後必貴方名為知人若捐髙資榜下臠狀元何難之有四六應用所貴翦裁或屬筆於人有未然則當通情商確建康王元樞初以中書舍人權直學士院除試工部侍郎仍直院落權字辭免奏劄弟及起曹議者疑焉託一故人草謝表內一聮云百工之事蘭省遽冒於真除一扎之書花磚復遵於故步王攺作散句蘭省遽接於英游花磚不失於故步翦裁固善然花磚宜貼故步上句或謂似稍偏枯頃年番江初刋成唐子西集時寓公曲肱熊叔雅來見先人偶案間置此書顧輝曰曽看否第九卷第一篇惠州謝復官表首云始以為夢既而果然語簡而意足可法也退而先人誨輝曰前輩觀書不茍簡類如此雖一覽亦記篇目後生豈可不勉先人嘗從張晉彥覔茶張答以二小詩內家新賜密雲龍只到調元六七公賴有家山供小草猶堪詩老薦春風仇池詩中識焦坈風味官焙可抗衡鑽餘權幸亦及我十輩遣前公試烹詩揔得偶病此詩俾其子代書後誤刋在于湖集中焦坈産庾嶺下味苦硬久方回甘浮石已乾霜後水焦坈新試雨前茶坡南遷回至章貢顯聖寺詩也後婁得之初非精品特彼人自以為重包裏鑽權幸亦豈能望建溪之勝輝出疆時見三節人或擕建茶㳂塗備用而虜中非絶品不顧蓋榷場客販坌集且能品第精粗中下者彼既不售乃齎以歸夷狄尚爾矧中國士大夫好事宜乎珍尚鑒别每相誇詡唯恐汲泉不活潑乳不多啜嘗而乏詩情也自熙寧後始貴密雲龍每嵗頭綱修貢奉宗廟及供玉食外賚及臣下無幾戚里貴近丐賜尤繁宣仁一日慨歎曰令建州今後不得造密雲龍受他人煎炒不得也出來道我要密雲龍不要團茶揀好茶喫了生得甚意智此語既傳播于縉紳間由是密雲龍之名益著淳熙間親黨許仲啓官麻沙得北苑修貢録序以刋行其間載歲貢十有二綱凡三等四十有一名第一綱曰龍焙貢新止五十餘夸貴重如此獨遺所謂密雲龍豈以貢新易其名或別為一種又居密雲龍之上耶葉石林云熙寧中賈青為福建轉運使取小團之精者為密雲龍以二十餅為斤而雙袋謂之雙角大小團袋皆緋通以為賜密雲龍獨用黃云輝家惠山泉石皆為几案物親舊東來數聞松竹平安信且時致陸子泉茗碗殊不落莫然頃歲亦可致于汴都但未免瓶盎氣用細沙淋過則如新汲時號拆洗惠山泉天台山竹瀝水斷竹梢屈而取之盈瓮若雜以他水則亟敗蘇才翁與蔡君謨闢茶蔡茶精用惠山泉蘇茶少劣用竹瀝水煎遂能取勝此說見江鄰幾所著嘉祐雜志果爾今喜擊拂者曽無一語及之何也雙井因山谷而重蘇魏公嘗云平生薦舉不知幾何人唯孟安序朝奉分寧人歲以雙井一斤為餉蓋公不納包苴顧獨受此其亦珍之耶待之以禮答之以簡與賔客言或許是為得體吕正獻公以翰林學士館伴北使虜頗桀黠語婁及朝廷政事公摘契丹隱密詢之曰北朝嘗試進士出聖心獨悟賦賦無出處何也虜使愕然語塞専對之次雖曰合成修好唯恐失其歡心若彼稍乖恭順亦宜有以折其萌俾知有人焉於交鄰遇客初無忤也祖母太夫人慈聖之後暇日與子孫談京都舊事政宣間以戚里數值誕皇子入內稱賀盛飾羣立於露臺人各許攜一從婢起居畢自殿陛上撒包子及成束金叉金銀俾衆婢爭奪或共得綵端即裂為二俯拾次多遺叉珥之屬殿上觀之為笑樂有惠捷者重負而歸亦有徒手無一物者時盛暑以一鍍金錢於御廊得水一杯其錫賚殊不多破費隨盡因歎南渡後不復見此盛事曹氏分南北宅祖母北宅也為武惠燕王五丗孫蕭注字巖夫臨江新喻人熙寧中上殿奏對罷上問今臣僚中孰貴曰文彥博又問其次曰韓琦又問王安石如何注曰牛形人任重而道逺一說𥙿陵問文彥博跛履韓琦嘶聲何為皆貴注曰若不跛履與嘶聲陛下不得而臣又問朕如何注曰龍鳯之姿天日之表臣無得而言又問卿如何注曰陛下以為貴則貴矣以為賤則賤矣注纍任邊要以知人自許上曰聞卿有袁許之學因問韓絳王安石馮京注曰安石牛耳虎頭視物如射意行直前敢當天下大事然不如絳得和氣多惟和氣能養萬物京得五行之秀逺之若可愛近之若廉隅見本傳近時州郡皆修圖志志之詳略係夫編摩者用力之精粗揚州為淮甸一都㑹自唐已名繁盛向有王觀通叟考古驗今托事千餘條效汴都以為賦今館中及揚州有本輝每謂建康六朝故都又為代邸興王之地亦應揄揚以亞雅頌雖聞江寧尉崔禮者嘗有此作而文不足起其事後未有繼之者輝嘗言于故人王錫老深以為然且有此意未幾錫老去為潭州之土丗謂鴈為孤而不曰雙燕曰雙而不曰孤以鴈屬乎陽燕麗乎隂陽數竒隂數耦故也然常言鴈序鴈行蓋亦有時而不孤燕雖有于飛之語古今賦詠何嘗必及於雙曰孤曰雙豈止以竒耦言之耶承平時兩學作成之盛不但英才輩出為國之華羣居燕處雖一時謔浪之語人皆喜聞而樂道之嘗見前輩說數事元祐間敏求齊有治春秋陳生與宋門一娼狎一日㑹飲于曹門因用春秋之文題于壁曰春正月會吳姬于宋夏四月復㑹于曹有繼其文戲之曰秋饑冬大雪公薨其意以謂財匱當有饑寒之厄也此固知非典語亦切中後生泆游迷而不返之病紹聖丁丑章持魁南省時有詩何處難忘酒南宫放榜時有才如杜牧無勢似章持不取通經士先收執政兒此時無一盞何以展愁眉紹興間秦伯暘魁多士汪彥章啓賀其父以南宫進士對東閣郎君尚疑為譏已其敢顯斥如前之詩乎韓持國維寶元間偕兄弟應進士舉預南省奏名而下弟士子有韓家四子連名之嘲蓋以其父忠憲公見在政路也時殿試尚黜落有司因故黜之公後遂不復試而兄弟皆再登第故潞公薦公謂南省曽預髙薦繼歷內外制知貢舉至登門下省不更賜出身初亦召試玉堂不就公之五丗孫元吉尚書特書此于桐隂舊話甚詳貴游子弟當考其素業不應例待以膏梁唐李德𥙿初不繇科甲顯元豐間駕生國子監出起居有旨人賜酒二升諸齊往往置以益之曰奉聖旨得飲遂自肆致有乘醉登樓擊鼓者因是遇賜酒即拘賣以錢均給以是知自昔國學有酒禁也輝頃在泰州偶倭國一舟飄泛在境上一行凡三二十人至郡館榖之或詢其風俗所答不可解旁有譯者乃明州人言其國人遇疾無醫藥弟祼病人就水濵杓水通身澆淋靣四方呼其神請禱即愈婦女悉被髮遇中州人至擇端麗者以薦寢名度種他所云譯亦不能曉後朝旨令津置至明州趂便風以歸長沙匠者造茶器極精緻工直之厚等所用白金之數士夫家多有之置几案間但知以侈靡相夸初不常用也司馬溫公偕范蜀公游嵩山各攜茶往溫公以紙為貼蜀公盛以小黑合溫公見之驚曰景仁乃有茶器蜀公聞其言遂留合與寺僧茶冝錫竊意若以錫為合適用而不侈貼以紙則茶味易損豈亦出雜以消風散意欲矯時弊耶邵氏聞見録云溫公嘗同范景仁登嵩頂由轘轅道至龍門涉伊水至香山憩石樓臨八節灘凡所經從多有詩什自作序曰遊山録攜茶遊山當是此時張藝叟云吕申公名知人故多得於下僚家有茶羅子一金飾一銀一棕櫚方接客索銀羅子常客也金羅子禁近也棕櫚則公輔必矣家人常挨排於屏間以候之申公溫公同時人而待客茗飲之器顧飾以金銀分等差益知溫公儉德丗無其比史傳褒貶成是敗非其來有素人之行孰先於孝悌項羽欲烹太公漢髙祖發分羮之言其於孝也何有唐太宗以藩王奪長嫡推刃同氣其於悌也何有脫使項羽建成有分羮推刃之惡史冊何以書之特髙祖太宗功勝於德耳建紹兵興日帥臣許辟置幕屬既素為知己其於婉畫裨助惟多今惟四川制帥如故事他皆命于朝賔主邈不通情殆與郡縣官等閫寄兵謀無從咨訪川泳雲飛豈復有相得之樂緩急利害既不相及相忘於江湖冝也太原名小朝廷蓋以得客之多范文正公亦有言幕府辟客須可為己師者乃辟之雖朋友亦不可辟蓋為我敬之為師則心懷尊奉每事取法庶於我有益耳龐莊敏守鄆守并皆辟司馬溫公為通判羅致大賢佽助一時皆然韓魏公門人有擊關夜出者閽吏不得賂詰旦以鎖損訴于公公曰鎖不堪用付市買修來滕逹道為范文正公客公鎮南陽每宴客逹道必出追妓文正雖不樂終不禁也時謂非二公之賢豈容不拘小廉曲謹之士前哲寬厚類如此是亦報杜書記平安之義唐內人墓謂之宫人斜道春明退朝録宫人斜見宋次四時遣使祭之唯應四仲祭使者暫悲嗟令狐楚詩也荒凉城南奉先寺後宫美人官葬此角樓相望髙起墳草間柏下多石人秩卑埋骨不作冢青石浮屠當丘壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黑風悲鬼搖樹宫中養女作子孫年年犢車來做主廢后園陵官道側家破無人掃陵域官家嵗給半千錢街頭買餅作寒食此元豐中張文潜留題奉先寺詩輝季女葬臨安北山僧舍四五年來每值春時往視寺之兩廡皆內人殯官徘回次未嘗不長哦此詩也輝復得歷陽所刋唐張文昌樂府北邙山篇云洛陽北門北邙道喪車轔轔入秋草車前齊唱薤露歌髙墳新起白峩峩朝朝暮暮人送葬洛陽城中人更多千金立碑髙百尺終作人間柱下石隴頭松柏半無主地下白骨多於土寒食家家送紙錢鴟鳶作窠巢上樹人居朝市未解愁請君暫向北邙遊古今名勝賦詠孰工覽者當自得之王右軍帖云獨活無風則搖有風不動石牌入水則乾出水則濕出水則濕可見入水則乾何自知之近年夷堅戊志序其略云葉晦叔聞於劉季髙有估客航海不覺入巨魚腹中未能死遇其開口吸水時適木工在乃取斧斨斫魚魚覺痛躍身入大洋舉船人及魚皆死或戲難之曰一舟皆死何人談此事於丗乎頗類前說清波雜志卷第四
