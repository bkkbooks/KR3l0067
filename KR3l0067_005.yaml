body:
  text: 清波雜志卷第五陳東字少暘太學生所上封事主李伯紀丞相力詆汪黃建炎元年死於應天府𬒳逮之際作遺書寄其家區處後事甚悉死生之變亦大矣神識殊不亂其帖今在其外孫括蒼潘景夔家頃年許右丞翰為作哀辭具著本末少晹初不識李丞相李念伯仁因我而死祀之家廟同時上書被行遣者歐陽徹撫州人髙宗臨朝嘗曰朕即位聽用非人至今痛恨之雖已各贈承事郎與有服親迪功郎一名猶未足稱朕悔往之意可各贈朝奉郎袐閣修撰更與恩澤二名撥賜官田十頃建炎三年又詔張愨古之遺直陳東忠諌而死二人皆葬鎮江府界可令本郡致祭嗚呼哀恤之典至矣少暘死之後其家但仰給賜田徹字德明靖康初虜犯闕請質二子二女而使穹廬御親王以歸不報死時年三十三又有進士徐暉乞借官入虜奉親王歸詔假暉通直郎往使亦卒無聞蘭亭序絲竹管絃或病其説而歐陽公記真州東園泛以畫舫之舟南豐曽子固亦以為疑司馬遷文章所以竒者能以少為多以多為少唯唐陸宣公得遷文體蘇子容魏公云為文之體意不貴異而貴新事不貴僻而貴當語不貴古而貴淳事不貴怪而貴竒宋元獻公序云中山府有夕陽樓輝出疆日騎馬自樓下過在城之隅規制甚小然鄭州亦有夕陽樓臨安穎州漢州皆有西湖建康有賞心亭揚州亦有賞心亭名雖同而顯晦異嘗記小詞夕陽樓上望長安憑欄干或攺為憑欄干望長安謂中山夕陽樓也沈存中云章華臺乾溪亦有數處淮西憲臣霍漢英奏欲乞應天下蘇軾所撰碑刻並一例除毁詔從之時崇寧三年也明年臣僚論列司農卿王詔元祐中知滁州諂事姦臣蘇軾求軾書歐陽修所撰醉翁亭記重刻于石仍多取墨本為之贐遺費用公使錢詔坐罪漢英遺臭萬丗臣僚亦應同科政和間潭州倅畢漸亦請碎元祐中諸路所刋碑從之大觀東庫物有入而無出只端硯有三千餘枚張滋墨丗謂勝李庭圭亦無慮十萬斤蔡京庫中點檢蜂兒見在數目得三十七稱黃雀鮓自地積至棟者滿三楹他物稱是童貫既敗籍沒家資得劑成理中圎幾千斤胡椒銖兩多安用八百斛今古所紀一律東湖徐師川俯紹興初繇諌垣遷翰苑贊幾命輝乾道丁亥在上饒從公季子圭遊因叩家集云詩已板行他無存者久而得奏議於殘編斷簡中猥并錯亂不可讀乃為整綴成十卷附以雜文一卷寫以歸之公視山谷為外家晚年欲自立名丗客有贄見盛稱淵源所自公讀之不樂答以小啓曰涪翁之妙天下君其問諸水濵斯道之大域中我獨知之濠上及觀序修水集造車合轍之語則知持此論舊矣東坡南遷度嶺次於林麓間遇二道人見坡即深入不出坡謂押送使臣此中有異人可同訪之既入見茅屋數間二道人在焉意象甚瀟灑顧使臣此何人對以蘇學士道人曰得非子瞻乎使臣曰學士始以文章得終以文章失道人相視而笑曰文章豈解能榮辱冨貴從來有盛衰坡曰何處山林間無有道之士乎輝頃得詩話一編目曰漢皋王季羔端朝嘗借去親為是正亦言不知何人作前説漢皋所書也一小説云漢皋張姓不得其名東坡在黃岡每用官奴侑觴羣姬持紙乞歌詞不違其意而豫之有李琦者獨未蒙賜一日有請坡乘醉書東坡五載黃州住何事無言贈李琦後句未續移時乃以却似城南杜工部海棠雖好不吟詩足之奬飾乃出諸人右其人自此聲價增重殆類子美詩中黃四娘使虜者冬月耳白即凍墯急以衣袖摩之令熱以手摩即觸破輝出疆時以二月旦過淮雖辦綿裘之屬俱置不用亦嘗用紗為眼衣障塵反致閉悶亦除去然馬上望太行山猶有積雪同塗官屬有至黃龍者云燕山以北苦寒耳凍宜然凡凍欲死者未可即與熱物待其少定漸漸蘇醒蓋恐冷熱相激霅川朱魯公丞相著秀水間居録一編之內於南渡諸公行事貶駮殆無全人其公論耶私意耶必有能辨之者自昔名賢嚴於輩行尤篤通家之好子弟見父執必拜或立受或答半禮呼以排行或稱小字書問以從表兄叔自處嘗記秦楚材內翰守宣城一族叔見於公廰稠人中敘至次乃舉小字以審之今則拜禮施於顯宦則有佞貴之嫌為父執者亦恐憑藉而為我纍通家之契替矣王元之之子嘉祐為館職平時若愚騃獨冦萊公知之喜與之語一旦問嘉祐曰外人謂劣丈云何嘉祐曰外人皆云丈人旦夕入相萊公曰於吾子意何如嘉祐曰以愚觀之丈人不若未為相為善相則譽望損矣自稱為劣丈未之前聞典家孰難其人嚴則利於子弟而不能久狎則利於已而負其父兄之託頃一巨公招客訓子積日業不進踧踖欲退巨公覺之置酒泛引自昔名流後嗣類不振且曰名者古今美器造物者深吝之前人取之多後人豈應復得士人解悟其迹遂安張無垢子韶云某見人家子弟醇謹及俊敏者愛之不啻如常人之愛寶唯恐其埋沒及傷損之必欲使之在尊貴之所故教人家子弟不敢萌一點欺心其鄙下刻薄亦為勸戒太息而感誘之此平生所樂為者今教子弟乃以主人厚薄為隆殺亦可笑矣渾然忠厚之氣可敬而仰之或謂童稚發蒙之師不必妙選然先入者為之主亦豈宜闊略丗謂初學記為終身記蓋亦此意韓蘄王在鎮江一日抵晚令帳前提轄王權至金山仍戒不得用船渡懇給浮環偕一卒至西津遂浮以渡登岸寺僧叵測疑為鬼物詰得其詳以手加額因指適所歷處皆黿鼉窟穴曰官既不死他日必貴權後果建節蘄王每與軍官飲用巨觥無算不設果肴王權一日竊懷一蘿蔔蘄王見之大怒曰小子如此口饞俾趨前以手按其額痛不可忍隨成痕腫既乃復與之飲二説得於權之子處智張循王罷兵柄就第一日秦丞相召相見言有少事煩郡王建康鎮江軍皆闕主帥請薦其人唯唯而退越旬申言之張辭以居間之久舊部曲不相聞未有可薦者秦曰教郡王薦翰林學士則難薦將帥職也張逼不得已以劉寶王權名上二人皆舊隸韓王軍紹興駕幸循王第過午尚從容循王再三趣巨鐺輩乞駕早歸內皆莫測所以他日有叩之者答曰臣下豈不願萬乘𣢾留私第為榮但幸秦太師府時未晡即登輦聞者嘆服識慮髙逺二説得於循王之姪子安子弟隨侍父兄顯宦不患人事不熟議論不髙見聞不廣其如居移氣養移體何一但從仕要當痛鋤虛驕之氣昔之照壁後訾相人物指摘儀度見其或𬒳上官詆訶進退失措者莫不羣笑聲聞于外及今趑趄客次庭揖而升回視照壁後竊窺者即前日之我也李才元大臨元祐間知汝州時辰州貢丹砂道葉縣遺其二篋乃化為二雉鬪山谷間耕者獲之人疑其盜縣械送州才元識其異訊得實始免耕者砂能變化可謂異矣夫識其異其誰嗣之似病元非病求間方得間殘僧六七輩敗屋兩三間野外無供給城中斷往還同行木上座相與住茶山乃曽吉甫侍郎詩茶山上饒名剎也輝在上饒三四年日從寓士遊遍歷溪山竒勝廖明略徐師川吕居仁鄭顧道曽宏甫諸公風流未逺邦人類能道之輝嘗欲裒集賦詠為一編目為玉溪唱酬以侈一時人物之盛因循不克成白屋同愁巳失鳯鳴之侣朱門自樂難容烏合之人唐鄭光鎮河中宣宗欲封其妾為郡夫人上表辭焉書記田絢之辭也宣宗大喜曰誰教阿舅作此好文左右以絢對便欲以翰林召之以不繇進士遂止今士大夫肆情昵愛恨無自以致其上僣肯辭朝命乎頃年見長上説元符間章子厚作相宗室宗景請再娶乃以嬖妾出之於外而託言仕族女事聞重黜之得不有愧於鄭光乎輝出疆時見虜中所用定器色瑩淨可愛近年所用乃宿泗近處所出非真也饒州景德鎮陶器所自出於大觀間窑變色紅如朱砂謂熒惑躔度臨照而然物之盛因循不克成白屋同愁巳失鳯鳴之侣朱門自樂難容烏合之人唐鄭光鎮河中宣宗欲封其妾為郡夫人上表辭焉書記田絢之辭也宣宗大喜曰誰教阿舅作此好文左右以絢對便欲以翰林召之以不繇進士遂止今士大夫肆情昵愛恨無自以致其上僣肯辭朝命乎頃年見長上説元符間章子厚作相宗室宗景請再娶乃以嬖妾出之於外而託言仕族女事聞重黜之得不有愧於鄭光乎輝出疆時見虜中所用定器色瑩淨可愛近年所用乃宿泗近處所出非真也饒州景德鎮陶器所自出於大觀間窑變色紅如朱砂謂熒惑躔度臨照而然物反常為妖窑户亟碎之時有玉牒防禦使仲楫年八十餘居于饒得數種出以相示云比之定州紅瓷器色尤鮮明越上祕色器錢氏有國日供奉之物不得臣下用故曰祕色又嘗見北客言耀州黃浦鎮燒瓷名耀器白者為上河朔用以分茶出窑一有破碎即棄于河一夕化為泥又汝窑宫中禁燒內有瑪瑙末為油唯供御揀退方許出賣近尤艱得紹興辛巳冬胡馬飲淮輝在建康城中南北既交兵捷音日馳後生輩喜躍獨老成人有憂色言頃嵗擾攘三鎮失守何嘗不日報捷於外路一日傳虜酋有來日早炊玉麟堂之語聞者震駭且日見俘獲係路氣象不佳未晡坊巷皆執兵扞衛如是者一月未幾遂有鳴鏑之變為夷狄戒天意也孔常甫武仲云石氏時胡王死其母囚後又助北漢拒周諸部力諌而虜主強之燕王述軌因衆心弒虜主而自立于紀妄動其報如此與完顔亮之事同李寶海道與虜人戰見其舟皆以油纈為帆舒張如錦繡未須臾噴濤怒浪捲聚一隅此以火箭環射之箭之所及煙熖隨發既敗走捷以聞遣使錫賚甚渥賞功建節御書忠勇李寶四字於金纏幹旗上以寵之方務德侍郎受知於張全真參政後每經毗陵必至報恩院張之祠堂祭奠修門生之敬祝文具在洪慶善嘗入梁企道閣學幕府後守番陽企道夫人尚在嵗時亦以大狀稱門生以展賀士夫併為美談張文節知白在桑贊幕下桑識其必貴祥符中文節為京西曹桑已死葬濟州奏乞每遇寒食至桑墓拜掃詔可之狄武襄青受范忠獻之知每至范氏必拜於家廟入拜夫人甚恭以郎君之禮事其子弟狄乃武將能知義不忘恩可書也先人云前輩聞知己訃音必設位以哭東坡詩白酒真到齊紅裙已放鄭謂有香泉一壺為樂全先生服不作樂須昌令聞舉將喪解後漢董翊舉孝廉為裴任與鄭餘慶友善任卒鄭為行服見孔常父雜記官歸唐杜審言為崔融所奬引融死杜為融服緦麻洪守番江日先人為郡幕時祖母留鄉里洪每值正至必以書送壽酒外題狀上太夫人凡僚屬有親者皆然先人既以書謝翌日再展狀謝此等禮數度前哲常行之特今為創見向見蘇後湖之子扶攜古畫羅漢十有六入關出以相示且云家丗珍藏殆百餘年大父昔在廬山下一日聞山谷先生在山中亟攜畫謁之求題尊者名號時死心禪師住歸宗一見笑曰夜來夢十六僧求挂搭命灑掃新浴室陳焉死心倡之山谷書之扶又言家有碼瑙盂用以日飯一尊者一失具飯太夫人夜必夢求齋其靈異如此嘗與友生葛慶長力贊其藏去以俟識者後聞歸京尹趙渭師矣繼聞趙復有所獻慶長恐此畫不再覿也乃約韓體作羅漢畫記輝在上饒玉山見貫休所畫十六羅漢像丗傳有三本獨此為真輝不識畫未敢為然貫休初畫古羅漢止十五尊或以為問乃以已貌足之米元暉善畫能以古為今蓋妙於薰染縑素先人在丹徒米嘗以自畫寒林見豫為好事者袖去先人復得于元暉少年所作楚山清曉圖嘗上于御府今猶可想像為之病懶未暇也元暉尤工臨寫在漣水時客鬻戴松牛圖元暉借留數日以模本易之而不能辨後客持圖乞還真本元暉怪而問之曰爾何以别之客曰牛目中有牧童影此則無也江南徐諤得畫牛晝齧草欄外夜則歸卧欄中持以獻後主煜煜獻闕下太宗示羣臣俱無知之者惟僧贊寧曰南倭海水或減則灘磧微露倭人拾方諸蚌臘中有餘泪數滴得之和色著物則晝隱而夜顯沃焦山時或風燒飄擊忽有石落海岸得之滴水磨色染物則晝顯而夜晦牧童影豈亦類此而祕其説老米酷嗜書畫嘗從人借古畫自臨榻榻竟併與真贋本歸之俾其自擇而莫辨也巧偷豪奪故所得為多東坡二王帖跋云錦囊玉軸來無趾粲然奪真疑聖智因借以譏之舊傳老米在儀真於中貴人舟中見王右軍帖求以他畫易之未允老米因大呼據舷欲赴水其人大驚亟畀之好竒喜異雖性命有所不計人皆傳以為笑曾祖殿撰與元章交契無間凡有書畫隨其好即與之一日元章言得一硯非丗間物殆天地袐藏待我而識之答曰公雖名博識所得之物真贋居半特善誇耳得見乎元章起取於笥曽祖亦隨起索巾滌手者再若欲敬觀狀元章顧而喜硯出曽祖稱賞不已且云誠為尤物未知發墨如何命取水水未至亟以唾點磨研元章變色而言曰公何先恭而後倨硯汙矣不可用為公贈初但以其好潔欲資戲笑繼歸之竟不納陳通亂後偕古大悲雷琴莫知所在米老嘗有題跋云侍講仁熟攜顧陸真迹保大琴會于米老庵即此畫并女孝經是也曽祖字仁熟時守京口唾硯事吳虎臣漫録誤書為東坡曽祖視王荆公為中表既于撰上丗墓志數種託元章書之凡書三本擇一以入石號周氏丗德碑置於杭州西湖上文并書名二絶紹興初某人尹京欲磨治攺刻他文偶族叔祖元仲與之素厚爭之力責以大義尹曰初不知是公家物叔祖曰脫非某家物介甫之文元章之字可毁乎尹謝焉不然危不免金石之厄今在南山滿覺院客打碑而賣者無虛日清波雜志卷第五
