body:
  text: 清波雜志卷第三煇居建康春時偕一二鄰曲至内後景陽臺臺之下一尼庵少憩見若琉璃色一瓦羫徑二尺許厚三四寸中空用以閣盆盎叩之鏗然有聲尼云近墾地得之乃李後主用此引後湖水入宫中雖瓦礫微物亦有時而顯晦又至白下門外齊安院主僧曰近治地得一玉盃已碎銀一鋌上刻永定公主爲誌公和尚淨髪之資一様十鋌行人問宫殿耕者得珠璣誠不吾欺張文潜雜書有云余自金陵月堂謁蔣帝祠初出北門始辨色行平野中時暮春人家桃李未謝西望城壁壕水或絶或流多鵁鶄白鷺迤邐近山風物夭秀如行錦繡圖􅀞中舊讀荆公詩多稱蔣山景物信不誣白公少客杭州自言欲得守杭卒如其言予亦云與東坡跋秦太虚夜航西湖至普明院舎舟從參寥並湖而行岀雷峯度南屏濯足于惠因澗入靈石塢得支徑上風篁嶺憩于龍井始至壽星院謁辨才一叚竒事景􅃐略相似皆可以􅀞但恐􅀞不就爾煇雖未甞夜游南北山如金陵郊野春游良不踈想像文潜所歷如在目前足不至者二十餘年特未知今復何似煇憶年及冠從父執陳彦育序游鍾山陳題三四詩於八功德水庵之壁寒􅀐瘦馬度山腰目斷青溪第一橋盡是帝王陵墓處野風荒草瞑蕭蕭十年塵土暗衣巾亂走江郷一病身西第將軍成底事北朝開府是何人止記其二陳句金人素與先人厚善先人甞次其韻雄壓吴頭控楚腰千峰環拱冶城橋黃旗紫蓋旋歸漢古刹凄凉尚號蕭北嶽經行匪濫巾相陪來現隱淪身春蘿秋桂還吾輩白浪紅塵付若人皆書于壁二十年後再過之皆不存矣郄后化蟒之地鹿苑院土人名爲蕭帝寺寺之殿宇猶是梁時建立者建康六朝故都葉石林少藴居留日甞命諸邑官能文者捜訪古跡製圖經時石橘林敏若子邁主上元簿考最詳多以王荆公詩引證號上元古跡煇先得其書後史志道侍郎修建康志宛轉借去志成爲助良多石林至新林因江寜尉林恪謁于道旁忽叩新林之名林即對乃王坦之倒執手板見亘温之地大喜曰不圖同僚中得一文士未幾以左傳託其㸃抹其見賞識如此方欲薦用而林卒開封人紹興戊午魁特奏名建康創建府治石林委府僚伻圖再三不叶意一旦杖䇿自往相視四顧指畫遂定儀門外列六位以處倅貳職官迨六蜚臨幸以設廰爲三省便廰爲樞密院六位爲六部次及百司皆有攸處其他政事精明彼民至今能道之石林爲從祖姑之夫煇㓜及識其風度偉人也石林爲蔡京客故避暑録所書政宣間事尊京曰魯公凡及蔡氏每委曲回互而於元祐斥司馬温公名何也建炎紹興初仕宦者供家狀有不係蔡京王黼等親黨一項今日江湖從學者人人諱道是門生石林其矯一時之弊耶絶江渡淮過河越白溝風聲氣俗頓異寒暄亦不齊煇淳熙丙申從使節岀疆回轅當三月中下旬一路紅塵漲天􅀬不可耐若江南五六月氣􅀱往還經從汴都顧瞻宗廟宫室不悟朝陽殿遂作單于宫不獨興歎於往古以中原復中原規恢洪業信自有時節煇老矣其及見諸侯東都之㑹耶士大夫欲永保富貴動有禁忌尤諱言死獨溺於聲色一切無所顧避聞人家姬侍有惠麗者伺其主翁屬纊之際已設計賄牙儈俟其放岀以售之雖俗有􅀬孝之嫌不䘏也又佩玉以尸沁爲貴酬價増數倍墟墓之物反爲生人寳玩是皆不可以理詰四十年前朝士遭論徑放謝辤蒼黃出關親厚者亦不敢相聞迨更化之後稍革此風猶未敢舒肆叔祖繇三院御史貳春官未幾罷斥時王公元樞徳言任小司空趨局即請早岀假同列叩之昌言答曰綸今日欲送周爲髙爲髙叔祖字也從列尾而至者一二耳近時去國者冠蓋祖餞從容理裝風俗歸厚於治丗豈小補哉括蒼管詮平仲監奏邸坐事免官秦丞相手封銀一笏以助其歸恃此方敢留一二日蓋秦早授館於其家故特致此禮政宣間除擢侍從以上皆先命日者推步其五行休咎然後岀命故一時術者謂士大夫窮逹在我可否之間朝士例許於通衢下馬從醫卜因是此輩益得以憑依今談天者既岀入貴人門第揣摩時事以售其􅀃偶爾符合遂名竒中卜以决疑卦影乃驗於日後反致人疑死生禍福貴賤各有定分彼焉能測造化之妙晁文元平生不喜術數之􅀃每謂自然之分天命也樂天不憂知命也推理安常委命也何必逆計未然哉宣和崇尚道教黃冠岀入禁闥號金門羽客氣燄赫然林靈素爲之宗主道官自金壇郎至太虚大夫班秩與庭臣同靈素初除金門羽客通眞逹靈元妙先生視中大夫後馴擢至太中大夫冲和殿侍晨視兩府道官同文官編入雜壓仍每遇郊恩封贈父母一日盛暑亭午上在水殿􅀬甚詔靈素作法祈雨乆之奏云四瀆上帝皆命封閉唯黄河一路可通但不能及外詔亟致之俄震雷大霔霔皆濁流俄頃即止中使自外入言内門外赫日自􅀂徽宗益神之宣和末死于温州未死間先自籍平日錫賚物􅀉之郡帑且爲治命殮以容身之棺棺中止寘所賜萬嵗藤柱杖封窆甚固建炎初唯下温州籍其貲而已後數年有内侍洗手劉太尉之姪避地至長沙於酒肆見一駞裘丈夫負壁而坐熟視乃靈素也劉叩先生何爲至此靈素曰吾亡命爾向不早爲此身首異處矣倐失所在靈素狡獪幸震一時及勢衰事變復以譎詐遁去異哉後葬永嘉黃土山先命見石􅀛方下棺開穴深數丈果得之當靈素盛時一日有詔兩學之士問道於其座下且遣親近中貴監莅靈素旣陞座首詔太學博士王俊乂乆而不岀旣岀乃昌言昔吾先聖與老聃同徳比義相爲師友豈有摳衣禮黃冠者哉聞者駭然各逡巡而罷王海陵人歷宰椽分符而終近萬元亨典郷郡雖載姓名于圖經人物志偶遺此一節時又有王仔昔者初館于蔡京第屬大旱徽宗焦心禱雨每遣中使持一幅素紙求仔昔書皆爲禱雨也一日中使再持紙至仔昔忽書一小符仍札其左云焚符湯沃而洗之中使大懼不肯受曰上禱雨今得此大謬矣仔昔怒曰弟持去上得之駭異蓋上黙禱爲寵嬪赤目者因一沃而愈詔封通妙先生後以語言不遜殺之紹興丁巳嵗車駕巡幸建康回蹕時先人主丹徒簿排辦新豐鎭頓物皆備御舟過止宣索生菜兩籃非所辦者官吏倉卒供進幸免闕事前頓傳報生菜遂爲珍品物有時而貴世事奚不然吴悊字長吉臨川人後徙建康早從王荆公學譚熙豐間舊事亹亹不倦與秦丞相有硯席舊晁共道居留日俾郷人舉其孝廉孝者當兵火擾攘之際供母養無缺廉者雖在窮約人或賙之有所不受雖曰郷論素與亦未免有所迎合繼以禮津置赴行在所館於太學未幾託疾告歸初無恩數爾後八行孝廉之舉寂無聞焉瓊花海内無二本唐人謂玉蘂花乃比其色許眞􅀃文瓊乃赤玉與花色不􅀋煇家海陵海陵昔􅀠維􅀭亦視爲郷里自㓜游戲無􅀟亭未見甚竒異處不識者或認爲聚八仙特以名品素髙爾后土祠前後地土膏􅃾尤宜􅆚藥歳新日茂及春開敷􅃾盛大纎麗富豔遂與洛陽牡丹並驅角勝孔毅父嘗譜三十有三種續之者􅂊十餘種夫豈能備固宜有所増益錢思公尹洛一日幕客旅見於􅀟桂樓下見小屏細書九十餘種皆牡丹名也洛花乆汗腥羶􅀭花在今日尤當貴重紅藥而黃腰號金帶圍初無種有時而出則城中當有宰相韓魏公爲守一岀四枝公自當其一選客具樂以賞之時王岐公爲倅王荆公爲屬皆在席缺其一莫有當之者㑹報過客陳太博入門亟召之乃秀公也酒半折花歌以揷之四公後皆爲首相後山陳師道云煇嘗詢于揚之故老皆云初不識所謂金帶圍者豈花與人物亦相爲榮悴乎煇祖居錢唐後洋街第宅燬於陳通之亂今韓蘄王府其地也嘗見故老言昔歳風物與今不同四隅皆空逈人跡不到寳連山吴山萬松嶺林木茂密何嘗有人居城中僧寺甚多樓殿相望出湧金門望九里松極目更無障礙自六蜚駐蹕日益繁盛湖上屋宇連接不減城中一色樓臺三十里不知何處覔􅀌山近人詩也或云爲此詩者黃姓失其名亦嘗作万俟丞相挽詩有地下若逢秦相國也應不􅀃到沅湘之句天下名山福地􅀋因行役窮日力且爲姑俟回程來觀之語所誤竟失一徃貽終身之恨者多矣煇頃隨侍自番陽順流東歸至南康阻風留一日乗興游廬山飯于歸宗旋至萬杉杉隂夾道蔽日抵羅漢觀大皷未至栖賢數里先聞三峽噴薄激射之聲動心駭目凡山南佳處領略粗遍爾後一再經從皆不暇訪陳跡至今清夢猶在巖壑間嘗有一編紀游今亡昭慈聖獻上賔庭臣進挽歌辭莫不紀垂箔事一詩云飲馬驅驕虜飛龍紀建炎艱危三攺嵗倉卒兩垂簾云云乃中書舍人林遹詞也一時傳誦挽詩自古皆五言至嘉祐末方有爲七言者乾道末晁強伯子健至毗陵祠蘇東坡於學宫其叔少尹子止爲之記其間言坡之葬也少公銘其墓皆非實録其甚者以賞罰不明罪元祐以改法免役懐元豐指温公才智不足而謂公斥逐出其遺意稱蔡確謗讟可赦而謂公進用由其選擢章亨之賊害忠良而云公與之友善林希之誣詆善􅀋而云公嘗汲引之子止所書如此少公之語誌文在可考也其然不其然乎祠宇成中寘坡塑像又徧求從壯至老及自海外歸儀刑繪于兩廡晁文元後子健爲景迂生以道之嫡孫祠堂碑後爲人磨去東坡自海外歸毗陵病暑著小冠披半臂坐船中夾運河千萬人隨觀之坡顧坐客曰莫看殺我否則素知彼民愛慕坡亦眷眷此地而不忘強伯尸而祝之之意岀此東坡初入荆谿有樂死之語蓋喜其風土也繼抱疾稍革徑山老惟琳來問􅃸坡曰萬里嶺海不死而歸宿田里有不起之憂非命也邪然死生亦細故爾後二日將屬纊聞根先離琳叩耳大聲曰端明勿忘西方曰西方不無但箇裏着力不得語畢而終歸老素志竟墮渺茫一丘壑天實嗇之淳熙己酉周益公罷相回江右小泊荆谿因董氏岀楚頌帖乃考坡自元豐七年以後經從此地月日本末爲詳刻石具在楚頌乃坡欲種橘名亭而不遂者也英州碧落洞乳羊飲鍾乳澗水體白如乳遇刲方見然不常有也通泰鹽地麋食艾生茸入藥故人極力捕獵以邀善價士大夫求恣􅄝慾有養巨鹿日剌其血和酒以飲其殘物命如此嘗聞宣和間艮嶽豢鹿數百千頭其大如驢虜圍城中盡殺以啗衛士茸角皆棄之族叔茂振以正字權外制日秦丞相俾代作進茶鹽法表繼聞秦自有所攺定迨付出所攺者不有成憲將何靖民八字耳或叩本語云不逮也後自同知樞密院責祕書少監分司居筠州踰年放還宗族勞其歸因言蘇黄門亦以少蓬分司居于筠州云不獨爾所寓之屋亦黄門舊宅既葬二十八年内翰洪公景盧方誌其墓當在樞府日洪爲編修官在翰􅁐一日召至中書受旨作建立皇子詔曰朕荷天右序承列聖之丕業思所以垂􅁉于後夙夜不敢康寜永惟本支之重彊固王室親親尚賢厥有古義普安郡王舊名壽皇藝祖皇帝七丗孫也自㓜鞠于宫闈嶷然不羣聦哲端重閲義有立亢于宗藩歷年滋多厥徳用茂望實之懿中外所聞朕將考禮正名昭示天下立愛之道始于家􅀖自古帝王以此明人倫而厚風俗也稽考前憲非朕敢私上讀之稱善又令製字以賜未幾遂柄用洪具著此文于誌中仍首載當時使事且云效坡公所作冨碑之體初試宏博以所業投湯岐公時季元衡南壽待制亦投文字湯嘗師之初許其魁奪一日謂季曰近有一周某至先生當處其下旣奏名季果次焉蔡卞之妻七夫人頗知書能詩詞蔡每有國事先謀之於床笫然後宣之於廟堂時執政相語曰吾輩每日奉行者皆其咳唾之餘也蔡拜右相家宴張樂伶人􅀭言曰右丞今日大拜都是夫人裙帶譏其官職自妻而致中外傳以爲􅀏煇在金陵見老先生言荆公甞謂元度爲千載人物卓有宰輔之器不因某歸以女憑藉而然其後蔡唯知報婦翁之知不知掩婦翁之失致使得罪天下後丗其於報也何有七夫人者一日於看樓見一僧頂笠自樓下過問左右笠甚重内有何物告以行脚僧生生之具皆在焉因歎曰都是北珠金箔能有多少亟使人追之意欲厚施其僧不顧而去異夫巡門持鉢者合堂同席以觴客客非其人則四座懽不洽而飲易醉返以應接爲苦選詩從軍有苦樂但問所從誰或欲易從軍爲飲酒飲酒欲懽無由自醉得勸則沉􅊺勸尤在乎勸侑辭遜之間五十年前宴客止一勸今則巡盃止三勸則無筭顚仆者相屬不但沉􅊺而已亦見風俗隨時奢儉之不侔然一席歡洽全在致勸辭受之際若盃行到手不留殘氣固豪矣於留連光景似欠從容是皆少年態度老去夫何能爲清波雜志卷第三
