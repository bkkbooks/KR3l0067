body:
  text: 清波雜志卷第七王荆公當國值生日差其子雱押送禮物雱言例有書送物閤門繳申樞密院取㫖出劄子乃許收下牓子謝恩縁父子同財理無饋遺取㫖謝恩一皆作僞竊恐君臣父子之際爲禮不宜如此乞自今應差子孫弟姪押賜並不用此例從之至當之論後皆遵行頃見老先生言此出荆公意奏檢亦公筆特假雱名爾雱字元澤大觀元年詔賜使相以上生日器幣故事止差親戚殊失寵遇大臣之意自今取㫖差官元澤年十三得秦州卒言洮河事嘆曰此可撫而有也使夏人得之則吾敵強而邉受患博矣其後王韶開熈河蓋取諸此靖康滄海横流之變萌於熈寜開邉書生輕銳談兵貽天下後丗禍患可勝既哉蜀先主傳載漢獻帝舅車騎將軍董承之語裴松之注桉漢靈帝母董太后之姪於獻帝爲丈人蓋古無丈人之名故謂之舅也後呼丈人爲外舅其本此乎然漢匈奴傳書且鞮單于云漢天子我丈人行若曰此語止爲尊老言非專指妻之父則可若謂古無丈人之名後學竊有疑焉於婦翁有泰山之呼泰山亦有丈人峯故俗生而富貴窮奢極欲無功無徳而享官爵又求長夀當如貧賤者何若又使之永年爲造物者無乃太不均乎履富貴者其可不思持之以徳靖康亂後汴河中多得珍寶有獲金燎爐者以尚方物人間不敢留復歸官府揚州倉卒南渡􅀭子江中遺棄物尤多後鎮江漁户於西津沙際有得一囊北珠者太平興國中鄭州修東嶽廟穿土得玉杵臼以獻亦五代亂離時之物金玉沒于池中蓋亦有時而復出樸樕翁陶朱集載閩人韓南老就恩科有來議親者韓以一絶示之讀盡文書一百擔老來方得一青衫媒人却問余年紀四十年前三十三樸樕單父人嘗宦于政宣間或云陳君向也曹武惠彬下江南副帥欲屠城曹力止之曰此已降不可殺曹後夢一神人告之曰汝能全江南一城人帝命賜汝城中人爲汝子孫故其後繁盛今雖湮微猶應出兩府曹泳景游嘗語此兩府其自期􅁘煇家逺祖國初知江州屬曹翰屠城之初遺骸徧野乃對廬山作萬人冢仍自爲記徳既及於枯骨或謂後嗣當有隂報有相先墓者言亦當出神仙髙叔祖諱恪字執禮第四十五治易甚精早魁郷薦一旦舎去傳道於徐神翁自稱赤局先生靈異不可具述郷人敬之但曰周先生家繪其像神翁書賛云周四十五衣破不補土木形骸神氣可取宣和詔不起錫守静處士之號羣從記其事跡甚詳兹不具載虜犯淮甸亦知守静名不犯其室建炎末尸解去其􅀠仲大亦得道有一皮篋無底取錢常不竭後隨先生羽化陽關去長安一萬里漢將楊興敗走出此關因以爲名長安城東出南頭名羈城門俗以其色青名曰青門見三輔黄圖范睢曰秦北有甘泉宫謂其下有甘泉水見戰國策邯鄲屬磁州邯山名鄲盡也言邯山至此而盡以城郭字皆從邑故作鄲見寰宇記金城郡一曰築城得金一曰取其堅固一曰以郡在京之西金西方之行望都謂登堯山見都酒泉謂泉如酒並見地里志此數條皆因人有問檢示之非特出也正五九仕宦者不交印俗忌牢不可破初不知爲藩鎮開府犒勞將佐宰殺物命設恐傷物命固然何獨此三月豈以浮屠氏謂此九十日爲齋素月耶不經之甚御筆除擢無非日下供職何嘗問日辰利不利或曰歷日上所書黄道假也君命到門真黄道也常平備凶荒立法甚嚴而米斛有以陳易新之條州郡恃以借兊先人任信幕後守不償前欠一旦漏底官吏並送鄰州勘鞠先人亦坐失於催促撥還科公罪笞不理遺闕二十年後因同時坐累該改秩爲銓曹留難索案至朝廷時宗衮益國公參大政從容見語近見先丈常平伏辯既不曾僉書何亦被鞠煇因言州郡刑獄􅁈濫有司以被朝命雖知不曾着字蓋亦行三問豈容不承罪及無辜大率􅀋此退而思之先人尚無恙或䧟深文固可雪理於今日矣自昔初除執政例薦所知三兩人建康王元樞初得政首以先人名聞乃自臨安筦庫除江東漕司幹官見次一任屢更使長皆欲發文字力辭之竟終於選調煇嘗於鄭暘叔靄家得荆襄及川蜀四路金石刻目爲五路墨寳鄭既録碑之全文刓泐者缺焉且附己說歐陽集古考究未備者間有辨正􅀋爲數巨帙考證良備悉上祕府其副因借留數月歸之弟録其目并其說前後亦得其漢刻十數種旋爲親黨沈虞卿取去鄭乃同州死事驤之子紹興間嘗歴四川監司其子忱徳云在蜀日李公仁甫乆相從於墨寳訂正有助焉且出數小紙細書皆李訂正之語前漢碑固多􅀳碑亦絶少蓋􅀳制三品方許立碑曾大父喜蓄古刻承平時蓋亦易致士大夫不甚祕惜兵火後散失一無遺者劉季髙侍郎嘗語先人頃年􅀩嘉其好古輟贈甚多皆秦漢間物在今日爲艱得語次亦嘗詢其名件歳乆復忘之紹興九年虜歸我河南地商賈往來􅂝長安秦漢間碑刻求售於士大夫多得善價故人王錫老東平人貧甚節口腹之奉而事此一日語共游近得一碑甚竒及出示顧無一字可辨王獨稱賞不已客曰此何代碑王不能答客曰某知之是名沒字碑冝乎公好尚之篤也一笑而散唐裴行儉破外國得瑪瑙盤廣三尺出以示將士爲軍吏捧盤升階跌而碎之叩頭流血請罪行儉笑曰爾非故爲何罪國朝韓魏公得二玉盃玉盤觴客次籍以錦寘于案爲執事者觸案碎于地非但一時略不變色竟無追惜之意與夫吕文靖俾小􅁎擎寳器入書室故戒及門若足踣而仆試諸子度量古今之事若合符節東坡教諸子作文或辭多而意寡或虛字少實字少皆批諭之又有問作文之法坡云譬如城市間種種物有之欲致而爲我用有一物焉曰錢得錢則物皆爲我用作文先有意則經史皆爲我用大抵論文以意爲主今視坡集誠然葉少藴云某五十後不生子六十後不蓋屋七十後不作官然晚年以子舎之多不免犯六十之戒屋成而公死矣二事得於洪慶善從叔其乂守吉陽到官書報此行再涉鯨波去死一間抵郡止茅茨散處數十家境内止三百八户無市井每遇五七日一區􅀺洞貿易頃刻即散僚屬一二皆土著攝官不可與語左右使令輩莫非貸命黥卒治稍嚴則爲變不測地炎􅀬上元已衣紗果實多不知名􅀲大如斗瓶但有名香異花此外色色無之東坡言昌化不􅀋人境以吉陽視之猶爲内郡不但飲食不具藥石無有也又書云一日出郊見横巨木於地上有穴覆以板泥封甚固叩從者不肯言再三詰之方言前政某歿于此屬無周身之具用此殮殯或扣有巨木何無板答以素無鋸匠後知因此感動得疾丐歸行至瓊筦竟殂三女繼亡諸喪皆寄湖廣不得歸備書之爲行險逺宦者之戒南海録言南人送死者無棺槨之具稻熟時理米鑿大木若小舟以爲臼土人名舂塘死者多斂於舂塘中以葬士夫落南不幸而死曾不得六尺之棺以斂手足形骸誠重不幸也唐太宗立皇子明爲曹王母楊氏巢刺王妃也有寵於上文徳皇后崩欲立爲后魏鄭公諫曰陛下方比徳唐虞柰何以辰嬴爲累雖從諫而止跡可掩乎不能正之於始其後髙宗之於武后明皇之於楊妃顧傳家法不以爲惡若鄭公之敢諫孰能繼之舅氏張必用家藏唐諸帝全身小像乃蜀中名筆巾裹紅袍年紀悠逺而色不渝獨明皇像别爲一幀幅巾跨馬左右侍衛單寡有﨑嶇塗路之狀題云幸蜀圖然僖宗亦嘗幸蜀未知孰是徽宗甞以小李將軍蔡絛鐵圍山記書觀者竊謂非佳兆丗所傳其摹本歟唐明皇幸蜀圖一横軸賜閤下臣下天聖七年詔士庶僧道不得以朱漆床榻至宣和間蔡行家雖卧榻亦用滴粉銷金爲飾趙忠簡公親見之其奢儉不同如此先人任江東漕幙與􅁑公謙問爲代文康公孫也魁然重厚古君子宦情丗故皆應以無心文采外深契禪恱後倅毗陵遇煇以通家子弟一日見語人生臘月三十夜要當了了方見平生着力處始意如平時舉􅁑藤爾别數年公守臨川一日屬微疾忽索筆書偈曰大洋海裏打鼔須彌山上聞鍾業鏡忽然撲破飜身透出虛空召僚吏示之曰生之有死如晝之有夜無足恠者若以道論安得生死若作生死㑹則去道逺矣語畢端坐而逝筆勢遒勁其家版行超脫如此東坡論陶淵明云出妙語於纊息之餘豈渉生死之流哉煇於􅁑亦云􅁑名郯丙午己亥壬戌乙巳煇命之八字也頃遇一老僧談五行見語若非乙巳不至今日若無壬戌不致竟老窮薄退神重事多失機㑹然福不成福禍不成禍所得者夀數差永淳熈戊申居都下除夕有二輩僞傳親知言至門出見􅁴非忽言奉聖㫖追對公事時以永嘉林氏爭分方興制獄初不持文引乃隨以往中無所慊神色泰然如常至府治門外坐于一室爲緫後知房轄已見燈二輩府皁後知爲詢扣年甲郷貫來歷往返者五六乃云不敢乆留再三摧謝送出門蓋悟其非也一時叵測既歸議訴于府尹趙子和尹云制院謬誤所謂緫轄使臣者亦宛轉致懇謂已科决元所遣之吏蓋本逮永嘉周和泰錯認顔摽作魯公也親舊見曉既京尹護失孰信其枉後兩日制獄事亦已復自念與傳記所書入􅁳誤追放還境界無異特幽明殊塗爾平生横逆莫此爲甚當是時廟堂禁從有知已聞之弟駭愕而已己酉終歳災屯無所不有特未溘然又留殘喘至今事定却有風聲鶴唳之警雖云氣數實使然益信老僧禍不成禍之說且爲官府追逮不審之戒嘗聞范魯公質暑中所執扇偶書大暑去酷吏清風來故人兩句於其上或見之言曰丗之酷吏􅁈獄何止如大暑也公他日當深究此弊公後見周祖首建議律條繁廣輕重無據吏得以因緣爲姦周祖特詔詳定是爲刑統州縣司刑憲者若人以魯公存心尚何酷吏􅁈獄之爲懼道士一萬人僧二十萬人乃紹興二十七年禮部見注籍之數時未放行度牒迨今三十餘年其復有所損溢歟紹興間福建大刹有申所屬謂積下度僧錢若干乞備申舉以獻助乞量給度牒三兩道蓋嘗試也時議者謂冝依所請弟令具戒臘最深者三五輩以聞並與師號以伐其謀淳熈問執政進呈江州置駐泊軍因依趙雄奏昨已凖宣諭賣度牒非佳事今湖廣緫領所歳有給降度牒定數不知紹興年間不曾給降亦自足用豈紹興間未有江州軍耶雄奏今契勘江州軍自紹興三十年創置以萬人爲額度牒初未行也上曰待以示三省朕不欲給降度牒當漸革之張孝祥建議自恭人至孺人邑號分等第立價許貴家婦女及妾投名書填則數百千萬不日可辦于以佐國用較以度牒生齒不削户口不耗仍不爲民之蠧雖曰得䇿終以鬻爵以誘婦人名器輕假而不果行煇家舊藏歴代錢譜十卷乃紹聖間李孝美所著蓋唐人顧烜張台先有纂說孝美重修也周秦後錢之品㨾具著于帙是特見於形似爾親黨洪子予收古泉幣數十百種自虞夏以降一無遺者每出示坐客道以所然皆有依據大抵古錢輪郭皆重厚叩之有聲雖王莽小錢名徑六分重一銖然亦不致輕薄豈上古鼓鑄但求精緻初不計銅齊耶洪死嘗叩其子云悉舉入棺矣或言其家慮爲勢力者攘取故爲之辭元豐間龐懋賢元英爲主客郎嘗著文昌雜録内一條以不知得一順天錢鑄於何代爲言書成後又言近得於朝士王儀家有錢氏錢譜乃史思明所鑄初以得一非長祚之兆乃改順天煇於洪氏見二錢文皆漢􅀠徑寸四分以一當通元開寶之百而李譜復云思明銷洛佛銅所鑄賊平無所用復以鑄佛今所餘伊洛間甚多視錢之譜爲詳以是知誠有益於未聞好事者黨裒諸家所譜更攷近丗圜法􅆓革萃爲一帙板行於丗不亦善乎嘗得一告詞云朕眷禮勲臣既極異姓王之貴䟽恩私室併侈如夫人之榮以爾脩態横生芳性和適㑹膺無䘏之貴終隆絡秀之家爰錫命書靡拘常典用肈封於大郡俾正位於小君往服寵光益循柔履紹興間權外制某人行如夫人及脩態横生或者於王言有疑時勲臣嫡室尚在正位小君之語亦有疑國朝宰相文潞公丙午生元祐元年平章事未有踵其後者范丞相己卯生建炎四年平章事未有處其先者自昔名公下丗太學生必相率至佛宫薦悼王荆公薨太學録朱朝偉作薦文以公好佛其間多用佛語東坡訃至京師黄定及李豸皆有䟽文門人張耒時知穎州聞坡卒出已俸於薦福禪寺修供以致師尊之哀乃遭論列責授房州别駕黄州安置雖名竄責馨香多矣山谷在南康落星寺一日凭欄忽傳坡亡痛惜乆之已而顧寺僧拈几上香合在手曰此香匾子自此却屬老夫矣豈名素相軋而然或傳之過宣和奉使髙麗詔路允迪傅墨卿爲使介其屬徐兢倣元豐中王雲所撰雞林志爲髙麗圖經考稽詳備物圖其形事爲其說蓋徐素善丹青也宣和末先人在歴陽雖得見其圖但能抄其文略其繪􅀞乾道間刋于江隂郡齋者即家間所傳之本圖亡而經存蓋兵火後徐氏亦失元本雞林志四十卷併載國信所行遣案牘頗傷冗長時劉逵吳拭並命而往是行蓋俾靣諭髙麗國王顒云女真人尋常入貢本朝路由髙麗如他日彼來修貢可與同來顒云明年本國入貢時彼國必有人同入京也海上結約兹爲禍胎劉莘老丞相工詩送安厚卿二人使髙麗云杳杳三韓國煌煌二使星海神無暴横天子有威靈時以爲絶唱後四句不傳熈寜中侍禁孫勉監澶州堤見一黿自黄河順流而下射殺之繼而暴卒入􅁳爲黿訴當償命殿上主者乃韓魏公勉實故吏乃再三求哀公教乞檢房簿既至隂府如所教以尚有夀十五年遂放還韓魏公别録所書其略如此魏公家傳則云右侍禁孫勉監元城埽埽多墊䧟費工料勉詢知有巨黿穴其下乃伺出射殺之數日勉方晝卧爲吏追去有黿訴當往證之既至一宫闕守衛甚嚴吏云紫府真人宫也勉仰視真人乃韓魏公也亟俯伏訴公微勞之曰汝當往隂府證事乎勉述殺黿事公取黄誥示之謂曰黿不與人同彼害汝埽殺之汝職也遣之使去出門遂寤事既播􅀭神皇謂輔臣曰聞說韓琦爲真人事否皆曰未之聞也上具道所以咨嗟乆之二說不同當以家傳爲正又一說政和間方士王志老語公之子吏部侍郎粹彦曰紫府真人乃隂官之貴未爲天仙又云公亦嘗爲十華真人下侍者粹彦曰然清波雜志卷第七
