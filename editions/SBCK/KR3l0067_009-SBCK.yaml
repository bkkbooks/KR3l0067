body:
  text: 清波雜志卷弟九天下名山洞府河陽府平陽洞台州赤城山玉京洞江寜府華陽洞舒州灊山司真洞杭州大滌洞鼎州桃源洞常州張公洞南康軍廬山詠真洞建州武夷山昇真洞南嶽朱陵洞江州馬當山上水府太平州中水府潤州金山下水府杭州錢唐江水府河陽濟瀆北海水府鳳翔府聖湫仙遊潭河中府百文􅇦龍潭杭州天目山龍潭華州車湘潭初朝廷以毎歳投龍簡而洞府多在僻逺處其齎送祭醮之且頗以爲擾天聖間下道録院定歳投龍簡几二十處餘皆罷之煇四十年前於馬當龍祠廊廡下見一碑刻投龍處所視此數頗有増益碑隂載祭享牲牢香幣樂節爲詳乃元豐間江州建立者再過之則亡張無垢貶南安凡十有四年寓處僧舍未嘗出門戸其一話一言舉足爲法警悟後學宏矣其甥于恕裒集語録十二卷既已刋行其間論語絶句讀者疑焉蓋公自有語解亦何假此發明奥義嘗叩公門人郎曄曄云此非公之文也語録亦有附㑹者唐制唯給事得封還詔書富鄭公知制誥日劉從愿妻遂國夫人王􅀩正女也既奪封罷朝謁乆之復其國封公乃繳還詞頭其命遂寢中書舍人繳詞頭蓋自鄭公始封實録本傅不載止見於蘇轍龍川别志熊克所著九朝通略書冨弼繳還遂國之事有礙於理亦恐所傳或致訛舛富鄭公薨司馬温公范忠宣來弔哭公之子紹庭泣曰先公有自封押章䟽一通殆遺表也二公曰當不啓封以聞既曰遺表自有常式恐難以元封押進御封可也押可乎東坡作公神道碑止云手封遺表使其子上之丗莫知所以言者袖中諫草朝天去歐陽公固嘗議之禄豈須多防滿則退年不待暮有疾便辭仕者若守此戒則不殆不辱可全始終進退之節頃見洪慶善書此語於座屏然晚有南荒之謫蓋亦昧於勇退士大夫能明哲保身以全終始者寡矣嫁女須勝吾家者娶婦須不若吾家者或問其故曰嫁勝吾家則女之事人必欽必戒娶婦不若吾家則婦事舅姑必執婦道安定胡翼之云安定爲此說必煇見老先生言此說皆得所歸而然歟有謂豈其男女昏嫁用石守道爲舉子時寓學於南都其固窮苦學丗無比者交游間嘗以盤餐遺之石謝曰甘脆者亦介之願也但日饗之則可若止得一餐則明日何以繼乎朝饗膏粱暮厭粗糲人之常情也所以不敢當歸之貧樂簞瓢賢矣哉嘗聞富鄭公辭疾歸第以俸劵還府府受之程伊川正叔曰受之固無足議還者亦未爲得也留之無請可也或曰餽食美意也受而不食可也却之近名也歐陽公爲西京留守推官事錢思公一日羣游嵩山取潁陽路歸暮抵龍門雪作登石樓望都城次忽煙靄中有車馬渡伊水者既至乃思公遣厨傳歌妓且致俾從容勝賞毋遽歸之意思公既貶漢東王文康公晦叔爲代一日訝幕客多游責曰君等自比冦萊公何如萊公尚坐奢縱取禍衆不敢對歐公取手板起立曰以某論之萊公之禍不在杯酒在老不知退爾四座偉之是時文康年已髙爲之動故歐公六十五即休致門生或有言公徳望爲朝廷倚重且未及年豈容遽去公答曰某平生名節爲後生描􅀞盡唯有早退以全晩節豈可更被驅逐乎以是知公未老告歸蓋以文康公爲戒且踐疇昔之言也或云歐公游潁陽見山中石壁上丹書神清洞即此時也書祠時尚諸公皆以王事從嵩山之游謝有二書抵梅聖俞歷部貟外郎直集賢院通判河南府謝希深絳與歐陽篇時明道元年九月也叙登覽之勝梅答以長一小説名黙記内一條云尹師魯性髙而􅄶在洛中與歐梅諸公同游嵩山師魯曰遊山須是帶得胡餅爐來方是游山諸公咸謂遊山貴真率豈有此理諸公羣起而攻之師魯知前言之謬而不能勝諸公遂引手扼吭諸公爭救之乃免煇見前輩云一時失言有所不免若曰愧而扼吭無是理也著黙記者亦不當書此洪駒父集侍兒小名三卷王性之續一卷好事者復益所未備雖曰擇之不精采摭未盡亦足爲尊爼諧謔之助士大夫昵裙裾之樂顧侍巾櫛輩得之惟艱或得一焉不問色藝如何雖資至凡下必極美稱名浮於實􅀋有可笑者豈故矜衒特償平日妄想不足則夸爾或謂若把西湖比西子澹粧濃抹揔相冝揔冝之名爲佳特恐無敢承當者公與洪玉父共成此性之之子明清云先語當得其實煇傳本誤矣編非駒父之所續也意此趙忠簡公秉政日使臣關永堅亦西人趨承云乆乃丐官淮上貧不辦行欲貨息女公憐之隨給所須永堅乞納女公卻之請力不得已姑留之後永堅解秩還公一見語之爾女無恙永堅謂宿逋未償公笑不答且助資送費囑求良配遂歸監平江梅里鎮宗室汝霖女言雖累年日侍丞相巾櫛及嫁尚處也汝霖與知泗州王伯路厚語其詳王云前輩於此等優爲之特今之人爲難能司馬温公曽魯公各有自似此一事傳於丗文多不載江南自初春至首夏有二十四畨風信梅花風最先練花風居後煇少小時嘗從同舎金華潘元質和人春詞有捲􅄕試約東君問花信風來第幾畨之句潘曰宫詞體也語太弱則流入輕浮又嘗和人蠟梅詞有生怕凍損蜂房膽瓶湯浸且與温存着規警如前朋友琢磨之益老不敢忘潘墓木拱矣山谷云野艇恰受兩三人别本作航航是大舟當以艇爲正今所謂航船者俗名輕舠如航湖航海亦爲常談沚之句所謂三翼皆巨戰船非輕舟也張景陽七命載在文選有汎三翼汎中秦少游發郴州反顧有所屬其詞曰霧失樓臺月迷津渡桃源望斷無尋處可堪孤館閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自繞郴山爲誰流下瀟湘去山谷云語意極似劉夢得楚蜀間語淚濕䦨干花著露愁到眉峰碧聚干闌乃張泌思越人詞黛眉愁聚春碧淚臉也見鄴侯家傳愁到眉峰碧聚此恨平分取更無言語空相覷斷雨殘雲無意緒寂寞朝朝暮暮今夜山深處斷魂分付潮迴去毛澤民元祐間罷杭州法曹至富陽所作贈别也因是受知東坡語盡而意不盡意盡而情不盡何酷似少游也乾道間舅氏張仁仲宰武康煇往見留三日徧覽東堂之勝蓋澤民嘗宰是邑於彼老士人家見别語墨蹟蘇東坡云如人善博日勝日負王荆公改作日勝日貧坡之孫符云元本乃日勝日貧吕正獻尤不喜人博有勝則傷仁敗則傷儉之語了齋陳瑩中爲太學博士薛昻林自之徒爲正録皆蔡卞之黨也競尊王荆公而擠排元祐禁戒士人不得習元祐學術卞方議毁資治通鑑板陳聞之因䇿士題特引序文以明神宗有訓於是林自駭異而謂陳曰此豈神宗親製耶陳曰誰言其非也自又曰亦神宗少年之文耳陳曰聖人之學得於天性有始有卒豈有少長之異乎自辭屈愧嘆遽以告卞卞乃密令學中敞髙閣不復敢議毁矣毁通鑑非細事也諸公未有紀之者止著於了齋遺事中國子監舊有安定胡翼之祠紹聖初自爲博士聞于朝徹去客言蘇伯昌初筮長安獄掾令買魚飼猫乃供猪襯腸詰之云此間例以此爲猫食乃一笑留以充庖同寮從而遂日買猫食蓋西北品味止以羊爲貴詔賜楚州孝子徐積絹三十匹米三十石積從胡爰學一見異待之嘗延食中堂二女子侍立將退積問曰門人或問見侍女否何以答之爰曰莫安排積聞此言省悟所學頓進此叚不但見於諸公紀聞亦載在哲宗實録乃元豐八年事也豈警後學要妙在莫安排三字故史臣從而書焉徐字仲車仲車雜著數十條臨川山陽板行其一云陳力就列不能者止近丗拜官徒爲飾詞已足耻矣而朝廷又爲之法曰至某官乃得辭免是教人爲僞也其兩府有除拜未受命必先押入其名已不正蓋賢者以禮進以義退既可押入必可押出此固然矣但立法有素豈易頓革柄臣爲國具瞻既膺大拜不應偃然即當其任故三辭再辭次及從官臺諫一辭而已此豈由􅂨特拘以法其不應辭者豈官㣲任輕進不係時之重而然歟兩府初除固已受命特未受告耳凡降㫖日下供職者皆未受告也食無精糲飢皆適口故善處貧者有晚餐當肉之語煇家與宗室通婚姻常赴其招家家􅀋留意庖饌非特調芼應律令且三字爛􅀬少爛則易於咀嚼熱則不失香味少則俾不屬饜而飫後品煇頃出疆自過淮見市肆所售羊邉甚大小者亦度重五六十斤蓋河北羊之胡頭有及百斤者驛頓早晩供羊甚腆既苦生硬且雜以蕪荑醤臭不可近􅀂用前二說製以餉客豈不快屠門之嚼哉王荆公解美字從羊從大謂羊之大者方美而東坡亦有翦毛胡羊大如馬誰記鹿角腥盤筵之句山谷簡何斯舉治具待客亦謂軟爛則宜老人豐㓗則稱佳客今日蔬食起權輿之嘆説食經而偶及此煇自四十以後凡有行役雖數日程道路倥偬之際亦有日記以先人晚苦重聼如幹蠱次叙旅泊淹速親舊安否書之特詳用代縷縷之問記向年貨田句金不遂取塗三茅得新刋山圖而歸濡滯良乆殊失倚門之望因思昔淵才乆出其家日望其歸歸止􅂝一布囊人謂其間必珍貨也後數日㑹親戚啓囊乃歐陽公新修五代史藁數帙李庭珪墨一笏而已煇用此書于日記後先人爲之一笑自隆興癸未至紹熈辛亥恰一丗伏書􅊄然王立之詩話書張宗古自堂後官守登州祈雪獲應一判官以詩爲賀宗古曰玩我欲繳進爲人勸止先人任饒幕與邵武黄堅叟爲代一日郡宴鄱江樓黄作木蘭花詞上别乗有監郡風流懽洽之語亦貽怒繳申郡牒問風流懽洽實跡黄歷攷古今風流懽洽出處辯答甚苦嘗取吏案以觀而得其詳要知投獻本求知又當視其人如何庶不返致桉劔特未知宗古所謂玩我何說其亦錦衾爛􅀆之􅀋乎張無盡嘗作一表云魯酒薄而邯鄲圍城門火而池魚禍上句出莊子下句不知所出以意推之當是城門失火以池水救之池竭而魚死也廣韻池字韻注云池水沼也古有姓池名仲魚者城門失火燒死諺云城門失火殃及池魚白樂天詩有火發城頭魚水裏救火竭池魚失水初不主姓名之説然廣韻所載當有所據詞頭代王言賞功罰罪若雷風鼔舞天下要當采公論載于訓詞以昭示懲勸某除某官若其人非素所與者必㣲寓詆誚於一二字中審其人不應此除曷不循繳還之制顧假命令以快我之好惡其可乎晁无咎貶玉山也過彭門而陳履常廢居里中无咎出小鬟舞梁州以佐酒履常作小闋木蘭花云娉娉裊裊芍藥梢頭紅様小舞袖低垂心到郎邉客已知金尊玉酒勸我花前千萬夀莫莫休休白髮簮花我自羞无咎云疑宋開府鐵心石腸及爲梅花賦清便艶發殆不􅀋其爲人履常清通雖鐵心石腸不至於開府而此詞清便艷發過於梅花賦矣元豐己未明略无咎同登科明略所游田氏姝麗也一日明略邀无咎晨過田氏田氏遽起對鑑理髮且盻且語草草粧掠以與客對无咎以明略故有意而莫傳也因爲下水船一闋上客驪駒至鸚喚銀屏睡起困倚粧臺盈盈正解螺髻鳳􅁫墜繚繞金盤玉指巫山一叚雲委半窺鑑向我横秋水斜領花交鏡裏淡拂鉛華怱怱自整羅綺斂眉翠雖有愔愔宻意空作江邊解珮頃在上饒得此説於晁族无咎跋云大觀庚寅四月十三日伯比季良无咎集國東之逆旅話此四事季良云可書也伯比季良當是羣從風流醖藉寓諸樂府雖曰纎塵不妨游戲於盃酒間餘一説乃陳襲爲錢唐妓周子文作四詩詞洪内相已載在夷堅庚志語皆合餘一未詳軍帥丁憂詔起復迨服闋猶以起復二字入銜或曉之答曰自抛了娘子却加得此官二年未曽遷轉又一輩銜内必帶宜差二字有㑭除去乃云元被受差劄上帶下來怎敢擅除一添差酒官不釐務堅要供職人亦語之在法只合閑坐請料錢其人言朝廷令某不離務趂辦課利豈敢閑坐請他料錢三者可􅀘笑林之遺舊制御厨折食錢凡十一等第一等舊折八十餘千紹興初減半餘遞減有差至第十一等舊折三十千亦損其半然尚宫内人赴景靈宫酌獻却係臨安府依格饌造食味每分白肉胡餅湯肉粉雜飣炊作炒肉煑菜羮飯軟肉所破料止羊肉十三兩麪五兩盝豆粉二兩米五合薪炭之屬凖此其儉如此或云乃承平舊制雖御厨末等折食則例亦不致是之窘也建炎初臣僚論帝􅁎或者謂非姓氏之􅁎乃􅁎侍之􅁎此尤不可豈有至尊之女而下稱􅁎侍乎若以謂避忌政和間主字乃主簿主書之主非國主家主之主也先是主字一切除去民間有無主之説又言􅁎者飢也亦用度不足之䜟乃詔改正乃政和二年蔡京三入相時建請改公主爲帝􅁎郡主爲宗􅁎縣主爲族􅁎議者謂周􅁎猶齊姜宋子也是使國女改從周姓故靖康初悉罷之清波雜志卷第九
