body:
  text: 清波雜志卷第十二先人罷信幙暫寓法曹􅅟房室間忽地䧟尺許微露棺和亟遷避他宇扣于州之􅂄舊皆言下乃古冢素多影響向有法曹黄姓者具牲酒自占數語祭之方圖擇高爽地以改卜是夕夢一偉丈夫來致謝且云陵谷變遷何常業乆處此望相安存煇因思自謝惠連祭􅁳漠君之後多倣其體曽文昭子開亦有瘞瓦棺文上饒寓公尹少稷諫議常稱高妙可配東坡徐州祭枯骨之作元祐七年正月南京濬南湖得瓦棺五長者纔三尺餘闊不踰尺厚不及寸瓦有從文初若堅緻觸之皆壞留守曾肈既往視之命遷瘞于湖之東南若干步高阜之地祭以酒果桉禮有虞氏瓦棺夏后氏堲周商人棺槨周人墻置翣周人以商人之棺槨葬長殤以夏后之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤此棺其葬殤者歟乃弔之曰虞耶夏耶商周之人耶勢耶富耶抑賤而貧耶生於何郷幾晦朔瘞於此地幾春秋耶夭壽歸於共盡老聃彭祖與子其均耶瓦爲藏而水爲宅豈不復子之真耶改卜高原既深且固於子爲戚抑爲欣耶有知也耶無知也耶尚有知也其肯舍故而從新耶亦載在曲阜集淳化五年翰林學士張洎獻重修太祖紀一卷以朱墨雜書凡躬承聖問及史官採摭事即以朱别之神宗正史􅀋因詆誣而非實録厥後刪改亦有朱墨本傳於丗其用淳化故事歟邵康節居洛陽宅契司馬温公户名園契富鄭公户名莊契王郎中户名若使今人爲之得不貽寄户免科調之譏乎或謂田宅乃三公所予者特未知王之名當亦是元祐間人貼職初止有集賢殿修撰直龍圖閣祕閣三等耳政和間詔謂天下人才富盛赴功趨事者衆官職寡少不足襃延多士乃增置集英右文祕閣修撰三等龍圖至祕閣凡六等仍入雜壓自昔直祕閣例過稱龍圖蓋直閣之名舊纔有二集英即集賢也端拱二年河南府言前郢州刺史穆彦璋以愛子死不願生挺身入山林飼餓虎異哉喪明尤天古雖有之此則丗未嘗有也見太宗實録頃年朝廷遣使投龍於茅山燕洞石門自開廣二尺餘得古銅錢百餘及金銀環各一桉茅山記梁普通中􅀳陵女子錢妙眞年十九辤親學道誦黄庭七言積四十年道成佩白練入洞洞門自啓至是再開煇母舅張守性棄從事郎爲黄冠受業茅山崇禧觀師號尋眞見素時山中有高道劉蓑衣喜其朴茂常留在左右因有所得一向佯狂嘗導煇游燕洞且俾窮探以其語素不倫謝之仍説近入至裏見仙人對弈以新蓮相啗方徘徊次忽念恐知宫相尋不覺身從後户出知宫其師也後十餘年以度牒寄其姊家飄蕩至今不知蹤跡先人以其終日浪走若有所營因即其師號戲易日尋魂見􅀑親舊傳以爲笑是乃五十年前事一時人凋零殆盡獨煇知之併識于此信州鉛山膽水自山下注勢若瀑布用以浸銅鑄冶是頼雖乾溢係夫旱澇大抵盛於春夏微於秋冬古傳一人至水濵遺匙鑰翌旦得之已成銅矣近年水流斷續浸銅頗費力日凡古坈有水處曰膽水無水處曰膽土膽水浸銅工省利多土煎銅工費利薄水有盡土無窮今上林三官提封九路檢踏無遺膽水膽土其亦兼收其利張懷素舒州人自號落魄野人崇寧元年入京師至大觀元年事敗牽引士􅀋一時以輕重定罪者甚衆吕吉甫蔡元度亦因是責降蔡嘗語陳瑩中懷素道術通神雖蜚禽走獸能呼遣之至言孔子誅少正卯彼嘗諫以爲太早漢楚成皐相持􅀍屢登高觀戰不知其幾歳殆非丗間人也自古方士怪誕固多有之未有如此大言者士大夫何信之篤惑之深耶後又有婦人虞號仙姑年八十餘有少女色能行大洞法徽宗一日詔虞詣蔡京京飯之虞見一大猫拊其背語京曰識此否乃章亨也京即詆其怪而無理翌日京對上曰已見于姑邪猫兒事極可駭熈寧實録亦載賜蔡州尼惠普號廣慈昭覺大師惠普有妖術朝士多問以禍福富鄭公亦惑其說浙右水郷風俗人死雖富有力者不辦蕞爾之土以安厝亦致焚如僧寺利有所得鑿方尺之池積涔蹄之水以浸枯骨男女骸骼殽雜無辨旋即填塞不能容深夜乃取出畚貯散棄荒野外人家不悟逢節序仍裹飯設奠於池邊實爲酸楚而官府初無禁約也范忠宣公帥太原河東地狹民惜地不葬其親公俾僚屬收無主燼骨别男女異穴以葬又檄諸郡傚此不以數萬計仍自作記凡數百言曲折致意規變薄俗時元祐六年也淳熈間臣僚亦嘗建議柩寄僧寺歳乆無主者官爲掩瘞行之不力今柩寄僧寺者固自若也至道元年西南䍧牱諸蠻貢方物䍧牱在宜州之西累丗不朝貢至是始通上問其吏寵光進地里風俗譯代對曰去宜州陸行四十五日土宜五榖人多食秔稻持木弩於林木間射麞鹿毎三二百户爲一州州有長殺人者不死以其家財爲贖王居有城郭官府無壁壘止短垣而已因遣令作本國歌舞一人捧瓢笙而吹如蚊蚋聲須㬰數十輩連袂宛轉以足頓地爲節上笑令罷䍧牱使十數輩從者百餘人皆蓬髪黧靣狀如猿猱使者衣虎皮氊裘以虎尾加於首爲上飾他悉􅀋此煇頃從使節出疆抵燕與渤海使先後入見當少須於次際見其過前服飾詭異殆不可名狀皆忍笑不禁雖虜人在傍亦失聲而笑是誠可笑也元豐六年冬祀中書舍人朱服導駕既進輦忘設扆褥遽取未至上覺之乃指顧問他事少選褥至乃登輦以故官吏無被罪者又一日羣臣方奏事垂拱殿見御衣有虫自􅁭􅆓至御巾上既拂之至地視之乃行虫其虫善入人耳上亟曰此飛虫也蓋慮治及執侍者聖徳寛大如此江上取魚用欄灘網日可俯拾濵江人家得魚留數日俟稍敗方烹或謂何不擊鮮云鮮則必腥海上有逐臭之夫於此益信兹謂神竒化臭腐又見故老言承平時淮甸蝦米用蓆裹入京色皆枯黒無味以便溺浸一宿水洗去則紅潤如新又歳乆佩香以虎子覆一夕芬馥仍舊兹謂臭腐化神竒或云無是理答曰藥物中秋石何自而出王荆公墓在建康蔣山東三里與其子雱分昭穆而葬紹聖初復用元豐舊人起呂吉甫知金陵時待制孫君孚責知歸州經從呂燕待之禮甚厚一日因報謁於清凉寺問孫曾上荆公墳否蓋當時士大夫道金陵未有不上荆公墳者五十年前彼之士子節序亦有往致奠者時之風俗如此曾子開亦有上荆公墓詩見曲阜集虜改吾趙州爲沃州蓋取以水沃火之義識者謂沃字從天水則著國姓中興之䜟益章章云建炎初從臣連南夫奏劄言女真號國曰金而本朝以火德王金見火即銷終不能爲國家患決幾至汴京向者黄河埽見太平於此益可見遺民思漢之心都人欲導水入汴謡語云天水歸汴復政和三年温陵呂榮義著兩學雜記凡七十二條所書皆太學辟廱事也内一條侯彭老長沙人建中靖國以太學生上書得罪詔歸本貫綴小詞别同舍十二封章三千里路當年走徧東西府時人莫訝出都忙官家送我歸郷去三詔出山一言悟主古人料得皆虛語太平朝野揔多懽江湖幸有寛閑處雖曰小挫而意氣安閑如此煇頃得於故老此詞既傳齋各厚贐其行亦傳入禁中即降㫖令改正屬同獲譴者不一乃格後繇郷貢竟登甲科紹興十三年再興太學榮義尚在累舉得光州助教乃摭舊記益未備爲八十一條更名上庠録投進而唱和詩影妻椅妾蓋以影爲妻故以椅爲妾四篇疑後來附入者上庠録嘗奏御理不應褻迨今五十餘年庠均之士未聞祖是編紀事實以廣賢關嘉話者似爲缺典范文正復元姓用陶朱張禄事丗皆傳誦大中祥符五年潯陽岳作五代史補百餘條蓋補王元之内相五代史闕文未備者其書梁事中有鄭準性諒直長於牋奏成汭鎮荆南辟爲推官汭嘗殺人亡命改姓郭氏既貴令準草表乞歸本姓其略曰臣門非冠蓋家本軍戎親朋之内盱睢爲人報怨昆弟之間㸃染無處求生背故國以狐疑望鄰封而䑕竄名非伯越乘舟難效於陶朱志切投秦入境遂稱於張禄如此則前已有此聮特文正公拈出尤爲切當云毗陵士大夫有仕成都者九日藥市見一銅鼎已破缺旁一人賛取之既得叩何所用曰歸以數爐炷香環此鼎香皆聚於中試之果然乃名聚香鼎初不知何代物而致此異頃年西湖上好事者所置船舫隨大小皆立嘉名如汎星槎凌風舸雪蓬煙艇扁額不一夷猶閑曠可想一時風致今貴游家有湖船不患製名不益新竒然紅塵膠擾一歳間能得幾回領略煙波但閑泊浦嶼資長年三老閉䆫户以適晝眠耳園亭亦然鄰郡歳時以酒相餽問有所不免孫公之翰典州日獨命别儲以備官用一不歸於己紹興間周彦約侍郎爲江東漕諸司所餉不欲卻乃留公庫迨移官悉分遺官屬仍以緍錢買書以惠學者廷即立法近制自孫公之後朝各利於己不能革也亦婁申嚴終以互送李公受虚已爲天聖從官喜爲詩與同年曾致堯倡詶曾謂曰子之詩雖工而音韻猶啞爾李初未悟後得沈休文所謂前有浮聲後有切響遂精於格律煇在建康識北客杜師顔嘗言少陵麗人行坐中八姨真貴人數目中八字最響覔句下字當以此􅀋求之杜早從陳子高學此說蓋得於陳云神宗朝剏置賣藥所初止一所崇寧二年增爲五局又增和劑二局弟以都城東西南北壁賣藥所爲名議者謂失元創藥局惠民之意歳得息錢四十萬以助户部經費今行在所置局歳課雖視昔有損意豈在夫羨贏其於拯民瘼施實惠亦云博矣紹興四年復置茶馬司買到四尺五寸以上堪披帶馬每一千匹與轉一官舊有主管茶馬同提舉茶馬都大提舉茶馬三等今併廢止留其一高宗留意馬政因韓丗忠獻一駿馬詔朕無用此卿可自留以備出入丗忠曰今和議已定豈復有戰陣事上曰不然虜雖講和戰守之備何可少弛朕方復置茶馬司若更得西馬數萬匹分撥諸將乘此閑暇廣武備以戒不虞和議豈足深恃乎後又詔吳璘軍以川陜茶博馬價珠及紅髪之􅀋艱難之際戰馬爲急又曰以茶博易珠玉紅髪毛叚之物悉痛朕心議者謂一西馬至江淛數千里逺在塗除倒斃外及至飼養詷習乆之可充披帶用者能有幾不知費縣官幾許財用若夫官吏論賞增秩抑末耳煇頃於池陽一士大夫處見紙上横卷山隂圖乃葉石林家本人物止三寸許已再三臨寫神韻尚爾不凡况龍眠真筆邪前有序賛各八句詞翰皆出石林石林文集丗不見其全此賛尚慮散逸矧墨妙之雅玩乎當時嘗録其文恐好竒之士雖不見􅀞而欲想像高勝今乃著于是龍眠李伯時􅀞許􅀇度王逸少謝安石支道林四人像作山隂圖􅀇度超然萬物之表見於眉􅊿逸少藏手袖間徐行若有所觀安石膚膄秀澤著屐返首與道林語道林羸然出其後引手出相酬酢皆得其意俯仰步趨之間筆墨簡逺妙絶一時碧林道人梵隆少規模伯時爲余臨寫真僞殆不辨更三十年丗當不知有兩伯時也此序也賛曰揚眉軒然意軼萬里亦將焉往而竟斯止日逺游者以是爲游疾走息隂彼將安休其二翰墨之娛以寫萬變不償一姥笑戢山扇袖手縱觀我行故遲豈以懷祖樂此逶迤其三韞玉于山煒然不枯我觀此容非山澤儒却顧何爲東山之陟如何淮淝乃折此屐其四一丗所驅顛倒衣裳是身何依獨委支郎從容三人亦躡其後人所無言聊一舉手後又見一本摹益失眞弟書四賛而亡其序清波雜志卷第十二
