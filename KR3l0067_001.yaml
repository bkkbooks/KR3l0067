body:
  text: 前代宫室多尚華侈本朝宫殿止用赤白此尚儉之法也前代人君雖在宫禁出輿入輦祖宗皆步自內庭出御後殿豈乏人力哉亦欲涉歷廣庭稍冒寒暑爾此勤身之法也前代人主在禁中冠服苟簡祖宗以來燕居必以禮竊聞陛下昨禮畢具禮服謝太皇太后此尚禮之法也前代多深於用刑大者誅戮小者逺竄唯本朝用法最輕臣下有罪止於罷黜此寬仁之法也至於虛已納諌不好畋獵不尚玩好不用玉器飲食不貴異味御厨止用羊肉此皆祖宗家法所以致太平者陛下不須逺法前代但盡行家法足以為天下上甚然之列聖家法之盛大臣啓迪之忠皆可書而誦也元祐大昏吕正獻公當國執議不用樂宣仁云尋常人家娶箇新婦尚點幾箇樂人如何官家却不得用欽聖云更休與他悶宰執理㑹但自安排著遂令教坊鈞容伏宣德門裏皇后乘翟車甫入兩部䦨門衆樂具舉久之伶官輦出賞物語人曰不可似得這箇科第相公却不教用實録具書納后典禮但言婚禮不賀不及用樂一節王彥霖繫年録載六禮特詳亦不書此宰臣吕大防等言昨奉聖旨宣諭皇帝納后有期已令入內內侍省檢舉施行者伏以塗山啓夏渭涘興周豫娶度土之辰親迎造舟之地若稽盛典適契亨期將開前寢之模宜謹曲臺之議恭惟皇帝陛下天錫仁孝日新光明躬親萬幾雖禀東朝之訓表帥九御尚虛中壼之尊伊欲迓于家邦必先正其服位太皇太后殿下念宗祊之奉篤風教之先歷詢慶門咨求淑媛將協定祥之兆當陳備物之嚴嘉命惟行體二儀之判合舊章可舉在六禮之親成自納采至于告期繇命使訖乎上禮車服有等幣贄有常古今相沿方冊具載臣等不勝大願伏望誕頒明詔豫敕奉常考沿革於前王參節文於通禮制為成式付在有司衮冕榖圭益重謹昏之義金根騩馬悉全象物之宜足以彰有命之自天知得賢之配聖善承億載流化萬方凡在懷生率同大慶太皇亦降答詔前輩謂元祐納后禮制視天聖景祐討論特為詳備天祐皇家母儀得昭慈之賢其後撥亂返正翊戴中興之主功參十亂兹謹具著焉國朝配享功臣於太廟橫街南東西相向設位太祖室趙普曹彬太宗室薛居正石熙載真宗室李沆王旦李繼隆仁宗室王曽吕夷簡英宗室韓琦曽公亮神宗室冨弼曹偉哲宗室司馬光徽宗室韓忠彥髙宗室吕頥浩趙鼎韓丗忠張俊視祖宗文武臣各用二人侑食蓋中興將相勳烈之盛不得而遺也天聖初元內出聖祖神化金寶牌令景靈宫分於在京宫觀寺院及外州名山聖跡之處牌長三尺許厚寸餘丈十二曰玉清昭應宫成天尊萬壽金寶背文五曰永鎮福地勑其周郭隱應虬龍花葩之狀精彩煥耀封以絳囊盛以漆匣或云用王居正藥金所製凡不經兵革州郡皆寶藏之輝嘗見於上饒天慶觀蓋留龍虎山頃見唐人官告印文細如絲髮本朝印文粗厚漫泐遲速雖係官府事之繁簡舊傳唯三司開封為省府事最繁劇所用印嵗一易今學士院印乃景德年鑄在京百司所用無如此久者舊制凡罷官三月不赴部選集者有罰輝見耆舊云承平時州縣多闕官得替還鄉未及息肩已竭蹶入京授見次即趣赴上一季半年已為逺闕到國門即入朝集院支俸差剩貟破官馬事事安便與今異矣政宣間掌朝廷書詔者朝士常十數人主文盟者集衆長而成篇靖康垂簾告天下手書出太常少卿汪藻筆紹興間婉容劉氏進位貴妃亦特命監察御史王綸草制或云時宰與王同里欲其霑賜金故臨期特畀權內制蘇東坡言少時與父并弟同讀冨韓公使北語録至於說大遼國主云用兵則士馬物故國家受其害爵賞日加人臣享其利故凡北朝之臣勸用兵者乃自為計非為北朝計也三人皆歎其言明白切中事機老蘇謂二子曰古人有此意否坡對曰嚴安亦有此意但不明白老蘇笑以為然輝觀三國志顧雍傳孫權時沿邊諸將各欲立功自效多陳便冝有所掩襲權以訪雍雍曰兵法戒於小利此等所陳欲邀功名而為其身非為國也又讀通鑑唐武德五年突厥犯邊鄭元璹詣頡利說之曰唐與突厥風俗不同突厥雖得唐地不能居也今虜掠所得皆入國人於可汗何有不如旋師復修和好可無跋涉之勞坐受金幣又皆入可汗府庫孰與棄昆仲積年之歡而結子孫無窮之怨乎頡利恱引兵還開元六年吐蕃求和忠王友皇甫惟明求奏事從容言和親之利明皇未然惟明力言邊境有事則將吏得以因緣盜匿官物妄述功狀以取勳爵此皆姦臣之利非國家之福乃許其和蓋皆祖述嚴安之言也後東坡載其說於鄭公神道碑之首亦有事成身蒙其利不成則陛下任張文定公當仁廟時論人臣勸用兵之語其患選人攺秩今當貟多闕少時須次動六七年成云考無玷闕方幸寸進戞戞乎難哉近制攺京官歲有定額且減薦數有憑藉者亦不待求而得之每患艱得職司若止許用職司一貟庶俾孤寒均得應格昔有胡宗英者該磨勘引見日仁宗驚其年少舉官踰三倍閲其家狀父宿見任翰林學士乃歎曰寒畯安得不沉滯遂降旨止與循資熙寧間一選人以貴援得京削十三紙引見日神宗云有舉狀一十三紙者是甚人特與攺次等官於是權勢聳然幕職州縣官以薦攺京官者其數如格則移刑寺問舉者無罪故乃得磨勘而注籍以待引見至引見又移問如初有罪故而不足於數者輒罷去考功郎趙㞦請勿再移問從之仁人之言也㞦乃清獻公之子國家慶壽典禮千古未聞錫類施澤下逮士庶婦人髙年亦如版授誠不丗之恩也然增加年甲僞冒寖出向來臺臣固已論列而嚴保任之制近見一文士作溫陽老人對切中此弊其辭曰溫陽之山有老人行年一百二十矣淳熙登號之三年朝廷舉行曠世之典有采樵者進而問之曰今天子朝太上皇德壽宫奉玉巵上千萬嵗壽肆大號加恩區內無問於己仕未仕之父母弟其年之如詔者而授之官叟何為而弗與老人對曰吾未及其年樵者曰叟年踰期頤若為而未及對曰天有二日人有二年有富貴之年有貧賤之年富貴之年舒以長貧賤之年促以短吾自幼至老未嘗識富貴之事身不具毛褐不知氷綃霧縠之為麗服也口不厭藜藿不知熊蹯豹胎之為珍羞也目不覩靡曼之色而蓬頭齞脣之與居耳不聽絲竹之音而嶤歌牧嘯之為樂今吾雖閲一百二十二年之寒暑而不離貧賤若以二當一則吾之年始六十有一與詔不相應是以為未及又何敢冒其官曰今之丗有年未及益其數求以應詔者朝廷亦官之何也對曰彼富貴者也吾固言之矣是所謂以一而當二者也其學寧越之徒歟吾儕小人不敢求其比樵者笑而退輝既得其說竊惟主上孝奉三宫十年一講盛禮鴻恩錫類方興未艾在位者其思有以革之庶幾名器增重不致冒濫人得以為榮清波雜志卷第一讀書貴有用昭禮於書無不讀而其用不見於丗胸中萬卷浩乎沛然者其真為無用之具耶清波雜志之作隨事記載證據今古亦殫洽矣間出已意折衷之議論所到有前輩不曽言開卷一覽聞所未聞使人起敬愛心聲聞播流當同此書為不朽則知讀書之用固有在此而不在彼者乎雖然抑末耳昭禮故倦游又從諸公貴人交耳目感觸形之詠歌酬唱蓋無日不有至於應用等文每出一斑已足以膾炙人口若遂裒而集之長編巨軸與雜志並傳不獨京師紙價為之貴將見萬丈之光騰薄於牛斗間者皆是物也夫紹熙癸丑夏四月括蒼章斯才書松巒先生有雜志二十卷藏于家今昭禮兄所為實追繼於前作涉歷久而見聞該閲習工而語意貼然則是書以晚年出也固宜紹熙癸丑九日毗陵張欣所惡乎雜家者為其害道也若周君此書雖出於平居暇日隨筆紀録之作而感時懷舊奬善黜惡斷斷然有補風教則奚惡於雜哉周君名族之胄忠信篤實悃愊無譁多識故老聞見殫洽言有從來咸可依據是書也其垂丗傳後何疑君之居于清波門也晦之弟晐實同里巷因得觀其書乃識其歲月而歸之蓋紹熙癸丑十有一月九日也吳興陳晦謹書余老無他嗜猶喜讀書幸經史百氏生平略游心獨苦耳聞近事殊駮比得清波二志釋滯增益良多嘻以昭禮記臆如許乃竟成躓士抑傳長虞所謂此屈非復文辭可了者言之令人重憤邑慶元二年六月晦山隂楊寅少雲跋周君余淮鄉博洽之士清波集乃其暇日所志也昔稗官者流街談芻議猶得來綴與九家並傳此志有關於風教者甚多渠可不傳逺乎雖然周君胸中該綜羣籍莫可窺測此志特其筆端游戲語爾慶元丁巳季冬既望刋城張巖書吳陵周氏丗禪雕龍衣冠煒燁昭禮尤篤學號能迎將承應者客游都城今其老矣抱道不試而能安於間放不關人事居清波門下往來湖山間把酒賦詩悠然自得其樂或謂可追和靖之風流比有傳其所著清波三志讀之起敬不但如前所云前輩日以逺舊聞餘論撫卷三復昭禮夀祉方增斑管緗縑登載朝野之盛蓋屢書不一書又奚得三志而已余少昭禮者殆將見之慶元戊午上辛楚龔頥正題余來中都聞有所謂周處士昭禮清波志急祈借傳録洪益處最多大抵紀載事實之書各隨所見收書者不厭其博也他日討論一事適然針芥相投車轍相合方知此書之效慶元戊午立秋前一日天台徐似道淵子書
