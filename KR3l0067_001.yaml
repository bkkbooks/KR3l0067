front:
  text: 清波雜志輝早侍先生長者與聆前言往行有可傳者歲晚遣忘十不二三暇日因筆之非日著述長夏無所用心賢於博奕云爾時居都下清波門目為清波雜志紹熙壬子六月淮海周輝識清波雜志卷第一髙宗繇康邸使虜庭開大元帥府於相州繼登寶位再造王室一時霸府攀附自汪丞相伯彥而次建炎初詔省記事跡成書來上付之史館其間所紀符瑞如氷泮復凝紅光如火雲覆華蓋其類不一獨諸路文書申帥府或曰康王或曰靖王有解坼靖康二字乃立十二月而立康王祥契昭灼如此時識者謂本朝無親王將兵在外故事忽付大元帥之柄於皇弟蓋本天意云髙宗初被命渡河隨軍一裨將某善人倫密語同列曰大王神觀甚佳此行必成大事舍人觀察亦保終吉但資政氣貌甚惡禍只在旦夕資政謂王雲也時以資政殿學士輔行行至磁州果被害于應王廟中書舍人耿延禧觀察使髙丗則時皆參謀議於幕府神宗初出閣封穎川郡王既即位升穎州為節鎮久之覺其非遂以許州為穎昌府人比之坊州生杜若吏部侍郎張舜民爾嘗考神宗嘉祐九年授忠武軍節度使封淮陽郡王治平元年封穎王三年立為皇太子初不曽封穎川郡王政和間工部侍郎劉嗣明奏恭惟神宗皇帝自忠武軍節度使穎王登大位其忠武軍止緣遙領節制巳升為穎昌府有穎川係受封興王之地伏望崇建府號遂以穎州為穎川府依舊順昌軍額悉符前說五代時有僧某卓庵道邊藝𬞞丐錢一日晝寢夢一金色黃龍食所藝萵苣數畦僧寤驚且曰必有異人至巳而見一偉丈夫於所夢之所取萵苣食之僧視其狀貌凛然遂攝衣延之餽食甚勤頃刻告去僧囑之曰富貴無相忘因以所夢告之且曰公他日得志願為老僧只於此地建一大寺偉丈夫乃藝祖也既即位求其僧尚存遂命建寺賜名普安都人稱為道者院則壽皇聖帝王封之名已兆於此髙宗自相州提兵渡河初程宿頓問地名以新興店對幕府進言大王治兵討賊行紹大統而初宿新興天意若曰宋室中興其命維新且以太平興國中宋捷之語為證紹興辛巳視師江上至無錫幸惠山酌泉泉上有汲桶桶間書吳安二字吳安閽隸姓名也侍衛者偶見之皆喜謂吳地可安或云亦嘗逹于聖聽頃得此說於惠山主僧法皥普安等名雖不同其為佳䜟則一也髙宗踐阼之初躬行儉德風動四方一日語宰執曰朕性不喜與婦人久處早晚食只麵飯炊餅煎肉而已食罷多在殿旁小閣垂簾獨坐設一白木卓置筆硯並無長物又嘗詔有司毁棄螺填倚卓等物謂螺填淫巧之物不可留仍舉向自相州渡大河荒野中寒甚燒柴借半破瓷盂溫湯􅺇飯茅簷下與汪伯彥同食今不敢忘紹興間復紆奎畫以記損齊損之又損終始如一宜乎去華崇實還淳返朴開中興而濟斯民也紹興二年修建康府行宫以圖進呈𬒳旨可只如州治修蓋一殿之費雖未為過而廊廡亦當相稱則土木之侈傷財害民何所不至象箸之漸不可不戒由是制度簡儉不雕不斫得夏禹卑宫室之意朱辨新安人建炎戊申嵗副王倫使虜被留館于雲中紹興壬子嵗王先得還至紹興癸亥約和已定朱方南歸嘗著曲洧舊聞云仁宗時最先言皇嗣者明州鄞縣尉不記其姓名閲嵗久之又經此喪亂史家亦不復載為可惜輝紹興間得婁寅亮奏劄曰先正有言太祖舍其子而立弟此天下之大公也周王薨章聖選宗室子育之宫中此天下之大慮也仁宗皇帝感悟其說詔英宗入繼大統文子文孫宜君宜王遭罹變故不斷如帶今有天下者獨陛下一人而已恭惟陛下克己憂勤備嘗艱險春秋鼎盛自當則百斯男屬者椒寢未繁前星不耀孤立無助有識寒心天其或者深戒陛下追念祖宗公心長慮之所及乎崇寧以來諛臣進說獨推濮王子孫以為近屬餘皆謂之同姓致使昌陵之後寂寥無聞奔迸藍縷僅同民庶臣恐祀豐于昵仰違天鑒藝祖在上莫肯顧歆此二聖所以未有回鑾之期黠虜所以未有悔禍之意元元未有息肩之時也欲望陛下於子行中遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服更加廣選宣祖太宗之裔材武可稱之人升為南班以備環列庶幾上副在天之靈下係人心之望臣本書生叨擢科第白首選調垂二十年今將告歸不敢終默位卑言髙罪當萬死惟陛下裁赦婁初不知其出處近聞乃溫州人字陟明擢政和二年進士乙科曽任察官屬鄉邦大浸父子皆沒於水或云論事之疏不止於此髙宗即位於南京肆赦文有兩本首尾皆同如道君發德音而罪已退辭履位之尊乾龍以震長繼天首正誤國之罪悉捐金幣分割膏腴思愛惜於兩朝忍輕加於一矢生靈受賜夷夏聞風要質賢王既驅車而北渡連結異域復擁衆以南侵慨溪壑之無厭昧蜂蠆之有毒廷臣乏䇿虜使詭和𣢾貔虎以退師致金湯之失險肆令狼子荐食都畿等語與今所傳本異蓋時有忌器之嫌也皆太常少卿滕康行滕後簽書樞密院南京人哲宗御邇英閣召宰執暨講讀官講禮記讀寶訓顧臨讀至漢武帝籍提封為上林苑仁宗曰山澤之利當與衆共之何用此也丁度對曰臣事陛下二十年每奉德音未始不本於憂勤此蓋祖宗家法爾讀畢宰臣吕大防等進曰祖宗家法甚多自三代以後唯本朝百三十年中外無事蓋由祖宗所立家法最善臣請舉其略自古人主事母后朝見有時如漢武帝五日一朝長樂宫祖宗以來事母后皆朝夕見此事親之法也前代大長公主用臣妾之禮本朝必先致恭仁宗以姪事姑之禮見獻穆大長公主此事長之法也上曰今宫中見行家人禮大防等曰前代宫闈多不肅宫人或與廷臣相見唐入閣圖有昭容位本朝宫禁嚴密內外整肅此治內之法也
