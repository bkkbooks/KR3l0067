body:
  text: 清波雜志卷第十中表張元友謂理減年賞於浙東鹽司吏以賂不滿欲實封奏狀外封貼黃以謂為渭亟往易之度其中必不誤書特以此一字見邀昔州郡桉酒官醖造違律不任沽賣吏受賄於任字上加一點遂免責罰豈刻木輩心傳此術以資弊幸唐史亦載有書漬為清者以是知添改偏傍有自來矣王晉公祜不置田宅曰子孫當各念自立何必田宅置之徒使爭財為不義耳嘗以百口保符彥卿無異志乃植三槐於第中便座謂其子必有任公台者文正公其子也較以田宅所得孰為少多非文正之賢其能成乃父之志翰林書待詔請春詞以立春日翦貼於禁中門帳皇帝閣六篇其一曰漠然天造與時新根著浮流一氣均萬物不須雕琢巧正如恭已布深仁皇后閣五篇其一曰春衣不用蕙蘭薰領緣無煩刺繡文曾在𧖟宮親織就方知縷縷盡辛勤夫人閣四篇其一曰聖主終朝勤萬幾燕居專事養希夷千門永晝春岑寂不用車前插柳枝春端帖子不特詠景物為觀美歐陽文忠公嘗寓規諷其間蘇東坡亦然司馬溫公自著日録特書此四詩蓋為玉堂之楷式自政宣以後第形容太平盛事語言工麗以相夸殆若唐人宮詞耳近時楊誠齋廷秀詩有玉堂著句轉春風諸老從前亦寓忠誰為君王供帖子丁寧綺語不須工之句是亦此意頃得玉堂集分為八帙或云李漢老所編者亦有皇太子府春端帖子康定二年劉渙奉使入西羌招納唃厮囉族部蕃法唯僧人所過不被拘留資給飲食渙乃落髮僧衣以行李復圭云耳輝得劉氏西行録乃渙所紀往返繫日以書甚悉且多篇詠雖所至必與蕃僧接且賴其鄉導既仗使節辟官屬計事冝結息信稱詔賜賚茶綵悉用漢官威儀范蜀公東齋記王聖塗澠水燕談皆及渙出使事俱不言祝髮渙字仲章保塞人天聖中以奉禮郎上書請徹簾還政後為右正言又隨孔道輔論廢后事以工部尚書致仕元豐元年卒沈隱侯曰古儒士為文當從三易易見事一也易識事二也易讀誦三也邢子才曰沈侯文章用事不使人覺若胸臆語深以此服之杜工部作詩類多故實不似用事者是皆得作者之奧樊宗師為文奧澀不可讀亦自名家才不逮宗師者固不可效其體劉協文心雕龍論之至矣向傳景文筆録復得一編名摘粹四十八事如辨碑刻及字音三四條皆互出前所論文見於摘粹為文奧澀公謂才不逮者不可效其體以是知公所修唐書後學其可妄議章子厚在相位一日國子長二堂白三經義已鏤板攽行王荆公字説亦合攽行合取相公鈞旨子厚曰某所不曉此事請白右丞右丞蔡元度也熬波之利特盛於淮東海陵復居其最紹興間歲支鹽三十餘萬席為錢六七百萬緍于以佐國用其利博矣自增置真州一倉遂稍損舊數捍海置堰肇自李唐國朝范文正公稍移其址疊石外固厥後刓缺不常隨即補治淳熙改元復圮於潮汐時待制張公子正守郡益加板築不計工費唯取堅實官資不足隂以私帑益之汔今是賴侍御史李粹伯處全記其成輝是年適在鄉里乃得其實鹽席錢緍之數見吳陵志東坡云昔僦宅於眉一日二婢尉帛足陷於地視之深數尺有大甕覆以烏木板先夫人亟命以土塞之人謂其下有宿藏物欲出也其後坡居于岐欲發地求藏丹崇德君曰使先姑在必不發也乃止唐李景遜為浙西觀察使母鄭早寡家貧子幼居東都因古墻壞得錢盈船鄭乃炷香祝之曰吾聞無勞而獲者身之災也天必以先君餘慶矜其貧而賜之則願諸孤它日學問有成乃其志也此不敢取命掩而築之二事實相似非智識賢明豈能及此然鄭愛幼子景莊每被黜於場屋母輒撻景遜景遜終以朝廷取士自有公道不肯私囑主司以是論之鄭母似有損於賢明無錫鄉士張公尚字思齊三舍時為名進士蹭蹬至紹興戊辰始預特奏名試待廷對間夢人語之官人往和州請衣既覺叵測有解之和州請衣必是食祿之地張自念脫或僥幸亦未應衣賜及唱名在末等補和州助教始悟衣者醫也為助教設人勸納敕為後圖張曰神告之矣乃拜命因賦四十字以自况老未脫場屋揆才無寸長九重雖射䇿一命不為郎尚喜衫仍緑仍憐牒是黃活人何不可政自有良方竟不霑祿而卒平日詩文皆膾炙人口求諸鄉人而未獲先人所著松巒志亦著此事首句云不信儒冠誤蹉跎鬢已蒼若夫夢兆則輝近方得之故今重出不特補志之遺抑亦正詩之誤吳長文不喜釋氏父卒不召僧營佛果閭巷常與父往還者各贈二縑韓魏公謂事親之際為尤難建安劉同知居留建康薨於官遺戒不事梵唄其家恪遵治命興化陳丞相當屬纊之際亦以手筆示其子謂追修無益於逝者豈二公自信平生踐履必可升濟初不假薦助冥福抑矯世俗溺信浮屠氏之説歟長文名奎嘗參機政於熙寧古治百里之邑令拊其俗尉督其姦故令曰明府尉曰少府唐之名臣繇尉超遷馴至公卿者不可以數計雖陸贄牛僧孺裴度顏真卿李絳皆此塗出今銓法以處試吏者腰弓撚箭從事鞍馬巡警阡陌餞迎貴宦斂扳揖於路左類以粗官目之判司簿尉不可説未免箠楚塵埃間不特興歎於昌黎公醖法言人人殊故色香味亦不等醇厚清徑復繫人之嗜好泰州雪醅著名惟舊蓋用州治客次井蟹黃水蟹黃不堪他用止可供釀紹興間有呼匠輩至都下用西湖水釀成頗不逮有詰之者云蟹黃水重西湖水輕嘗較以權衡得之輝向還鄉郡飲所謂雪醅亦未見超勝豈秫米日損水泉日增而致然耶抑醖法久失其傳大抵今號兵厨皆有此弊不但泰之雪醅也韓魏公妻弟崔公孺持論甚正公喜與之語偶泛及差除公孺忽曰豺狼虎豹蛇虺天乃屏置於山林深僻之地者蓋恐為人之害也今監司郡守一失選掄置在要路其為民害得不甚於豺狼虎豹蛇虺乎公默然凡今廟堂進擬符節次得不鑒公孺之論而益精其選唐路巖為相密奏應臣下有罪賜死皆令使者剔取結喉三寸以進驗其實至是賜巖死乃自罹其酷行刑之處乃楊收死所蓋收為巖所陷者本朝盧公多遜貶朱崖李符知開封府言于趙韓王曰朱崖雖在海外而水土無他惡貶者多生全春州在內地而近至者必斃望追改前命亦外示寬貸乃置於必死之地趙頷之月餘符坐事貶宣州行軍司馬上怒未巳令再貶嶺外趙具述其事即以符知春州到郡月餘而卒天道好還其速如是史傳不載似此不一姑舉二者以為丗戒郵亭客舍當午炊暮宿弛擔小留次觀壁間題字或得親舊姓字寫塗路艱辛之狀篇什有可采者其筆畫柔弱語言哀怨皆好事者戲為婦人女子之作頃於常山道上得一詩迢遞投前店颼飀守破窗一燈明復暗顧影不成雙後書女郎張惠卿逮回程和已滿壁衢信間驛名彡溪謂其水作三道來作彡字形鮑娘有詩云溪驛舊名彡煙光滿翠嵐須知今夜好宿處是江南後蔣潁叔和之云盡日行荒徑全家出瘴嵐鮑娘詩句好今夜宿江南潁叔豈固欲和婦人女子之詩特北歸讀此句有當於心戲次其韻以志喜耳輝頃隨侍赴官上饒舟行至釣臺敬謁祠下詩板留題莫知其數劉武僖自柯山赴召亦記歲月于仰髙亭上末云侍兒意真代書後有人題云一入侯門海樣深謾留名字惱行人夜來髣佛髙唐夢猶恐行雲意未真近年上官遇僚屬日益簡倨縱有從厚者皆以失體之名歸之頃黃徽猷崇書為漕江東嘗對客言公廳上論職事或未免厲辭色若杯酒間詎可無和氣以相接晚會徹爼有應循廊者豈有竟夕相陪笑語從容昏夜使其偕執侍者僕僕疾趨者乎當悉俾就席次登車且云是亦前輩故事也後得一小説韓黃門持國典藩觴客早食則凛然談經史節義及政事設施晚集則命妓勸飲盡歡而罷雖簿尉小官悉令登車上馬而去黃所及前輩故事其謂是耶唐中和四年時溥獻黃巢及家人首并姬妾僖宗御大元樓受之宣問姬妾汝曹皆勳貴子女丗受國恩何為從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀今陛下以不能拒賊責一女子置公卿將帥於何地乎僖宗不復問皆戮於市人爭與之酒其餘俱悲慟昏醉居首者獨不飲不泣至於就刑神色肅然劉更生傳烈女八篇俱著姓氏唐史烈女傳亦然而獨遺此若非司馬溫公特書於通鑑中則視死如歸應對不屈之節卒泯泯而不傳惜不得其姓氏時又有大將王緒令軍中無得以老弱自隨犯者斬王潮兄弟獨扶其母緒責之曰軍皆有法未有無法之軍汝違吾令而不誅是無法也三子曰人皆有母未有無母之人將軍奈何使人棄其母緒怒命斬其母三子曰潮等事母如事將軍既殺其母請先母死將士皆為之請乃舍之亦以其辭正也或免或不免係於一時未幾緒為潮所擒唐柳氏自公綽以來丗以孝悌禮法為士大夫所宗玭常戒其子弟曰凡門地高可畏不可恃也立身行已一事有失則得罪重於他人無以見先人於地下此其所以可畏也門高則驕心易生族盛則為人所嫉懿行實才人未之信小有疵纇衆皆指之此其所以不可恃也故膏梁子弟學宜加勤行宜加儉僅得比衆人耳古今家誡深切著明孰踰於此蓋有鏤板以曉於丗者所謂子弟千百中曷有一二顧省者聽之藐藐則皆是也姑識此以示兒輩人凶非宅凶古有是語然空間之廬久無人迹亦有可疑者頃僦數椽茇舍於無錫其屋雖多變怪初不以為異一夕忽火發於庖屋煙坌而熖不起亟升以朴滅於茅茨下得尺許通紅炭翌旦再視其處了無燒痕蓋此舊為神祠初不知也遂遷他所後其屋卒歸煨燼僦居去留固輕若創建第宅趣於落成歲月方隅或犯所禁且不忖分量唯務壯麗不旋踵自速其釁者多矣為宰相府頗隘為奉禮太祝之居則有餘先哲所見乃如此紹興初先人為丹徒簿曾魯公丞相時簿領金壇為僚意好甚篤後曽待浙西帥幹闕權嘉禾新塍稅復相解后一日語先人連夕夢有俾更名云名更方貴曽元名偶有所避改後名蓋三十年前已形於夢兆矣自此參大政再登宰席一時僚舊無在者深有推挽意而先人故倦遊但欲廟令以俟老平生往返書尺束如牛腰散失殆盡獨餘許祠祿一帖曾素善飲每醉則命徹爼拭案語客曰請卓子喫一服感應元復各舉一大白方散輝幼即接侍風味高勝晉宋間人也至和三年劉原父敞使契丹檀州守李翰勞其行役劉云跋涉不辭但山路迂曲自過長興却西北行六程到柳河方稍南行意甚不快又云聞有直路自松亭關往中京才十餘程自柳河才二百餘里翰笑曰盡如所示乃初踏逐修館舍已定至今迂曲後范中濟子竒出使虜道使者由迂路以示廣逺范詰之曰抵雲中有直道旬日可至何乃出此耶虜情得默然緣二公素精地理學故毋得而欺輝出疆過白溝日行六七十里若百餘里窮日力方到或問今日之程行逺答曰此中宿食頓地里逺近初不定蓋亦取夫館舍之便嘉祐赦敕服緑涖事十五年改緋光祿卿王端建議公卿子弟襁褓得官未嘗從事而錫命與年勞者等何以示勸請以涖事日為始遂著為令時以為當推此類而言亦有合舉行者廣南黎洞非親喪亦頂白巾婦人以白布巾纒頭家有祀事即以青葉摽門禁往來人皆文身男女同浴故曰冒白鄉風舊摽青社酒酣文身老及幼川谷女同男近有族人自海外歸詢之曰然紹興庚辰在江東得蜀人黃大輿梅苑四百餘闋輝續以百餘闋復謂昔人譜竹及牡丹芍藥之屬皆有成詠何獨於梅闕之乃采掇晉宋暨國朝騷人才士凡為梅賦者第而録之成三十卷謀於東州王錫老詞以苑名矣詩以史目可乎王曰近時安定王德麟詩云自古無人作花史官梅須向紀中書蓋已命之矣輝復考少陵詩史專賦梅才二篇因他泛及者固多取專賦略泛及則所得甚鮮若併取之又有疑焉叩於汝隂李遐年李曰詩史猶國史也春秋之法褒貶於一字則少陵一聮一語及梅正春秋法也如巡簷索笑滿枝斷腸健步移逺梅之句至今宗之以為故事其可遐遺非少陵則取專賦可也後在上饒梅苑為湯平甫借去湯時以寓客假居王顯道侍郎宅不戒于火厦屋百間一夕煨燼尚何有於梅苑哉梅史隨亦散佚雖嘗補亡而非元本歲當花開時未嘗不哦其詩歌其曲神交揚州法曹西湖處士懷舊編而訴遺恨焉羣赴郡宴甲年少勇於見色甫就席乙以服辭乃命徹樂勸酬次甲尤乙曰敗一席之歡爾也真所謂不自殞滅禍延過客也賔主為之烘堂五十年前服親喪終制不觴客人亦不敢招致親舊欲相𣢾必就寺觀具素饌仍不置酒時謂當然不以為異沿江烽火臺每日平安即於發更時舉火一把每夜平安即於次日平明舉煙一把緩急盜賊不拘時候日則舉煙夜則舉火各三把紹興初江東安撫大使李光所請輝生長江南足不涉極邊初未識所謂烽火者但讀陸務觀放翁記遊梁觀塞上傳烽詩月黑望愈明雨急滅復見初疑雲罅星又似山際電亦可想像得髣佛云清波雜志卷第十
