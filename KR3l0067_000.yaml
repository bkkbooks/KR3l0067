front:
  text: 余故人周昭禮嗜學攻於文當丗名公卿多折節下之余與昭禮定交今不翅二十年矣每一別再見喜其論議益該洽文益工今老矣而志益壯一日示余以所撰清波雜志十有二卷紀前言往行及耳目所接雖尋常細事多有益風教及可補野史所闕遺者蓋昭禮家藏故書幾萬卷平時父子自相師友其學問源委蓋不同如此今寓居中都清波門之南故因以名其集云紹熈癸丑春古括張貴謨序清波雜志目録
  hash: sha256:bcc1fe54f2cbf1e42f506f75dae372f93e779f9f84e725d2bcf2d5abe7c0017c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0067_SBCK_000-1a}
body:
  text: 卷第一潜邸瑞㢋裨將善相穎川郡王普安院新興呉安思陵儉德建康行宫婁寅亮請立嗣赦書二本祖宗家法元祐太昏冊后典禮配享金寳牌印文赴調期限掌書詔用兵利害改秩慶壽推恩卷第二蔡童罪惡王黼身任伐燕右府太尉凉傘修書謬無賞疑獄沙門島罪人馬子約隂德扁牓紹興置衫帽凉衫表章用字諸公前身東坡八賦重湖詩小孤祠婦女夾拜秋武襄像青沙爛書畫優伶神御殿蔡京東明䜟青布條蔡京二事鑄錢樣母養玉盞玉巵呼子爲公失認旗表忠碑王荆公日録賜進士及第期集錢卷第三景陽臺金陵風物鍾山唱和上元古跡新林名建康府治避暑録朔北氣候士大夫好尚朝士去國日者談休咎林靈素王俊乂問道王仔昔生菜呉長吉瓊花金帶圍錢塘舊景廬山挽詩東坡祠坡入荆溪乳羊茶鹽表立皇子詔宏詞取人七夫人行脚僧觴客歡洽優伶卷第四借書藏書造請䟽數逐客張芒叟遷謫碧雲騢能容於物從官薦自代四六翦裁唐子西復官表焦坈茶密雲龍拆洗惠山泉館伴應對汴都舊事蕭注人倫修圖經詳略鴈燕兩學人物章持及第賜監生酒倭國茶器吕申公茶羅史傳是非辟置幕屬修鎻宫人斜獨活石碑卷第五陳東蘭亮序文體二夕陽樓重刻醉翁亭記大觀東庫蜂兒徐東湖二道人海棠詩朔庭苦寒秀水間居録名賢輩行劣文家塾發蒙師渡金山軍中飲薦二帥幸第隨侍子弟丹砂變雉茶山詩封妾定器辛已榎攘李寳海道立功修敬祠堂壽酒貫休羅漢清曉圖牧牛影王右軍帖唾硯丗德碑卷第六不書温成碑榷酤經緫制錢元祐諸公日記北郊齋宫賣卦陳二說上元二詩初寮曲宴百韻符離府庫外國章表碼碯不除太常卿養生修身大理僞貢送鄒道郷御爐炭江岸竹籠石丙午年入呉蜀舅姑郎潜貧富受賜蘇林交情凶終遺留物虜庭玉錢審察正身岀頭冷茶闞亡投剌禁苑花竹東西園遇郊任子卷第七生日押賜洮河開邊丈人生而富貴汴河遺物恩科議姻曹武惠下江南陽關數條交印避忌常平四路墨寳秦漢碑刻没字碑碼碯盤坡教作文石林三戒吉陽風土惡弱曹王母唐帝像卧榻縷金葛公坐亡僧譚禍福大暑去酷吏僧道數錢譜順天得一王言有疑窣輔年甲名公下丗使髙麗劉莘老詩殺􅷞卷第八中興頌板本訛舛芝山詩垂肩冠冨春坊郵亭曲慧林老髙山仰止西園㑹食料羊唐詩選宋詩選水晶四先生老人髮膚龍驤將軍姚解元知和叔宣和騎射郡守畫像范忠宣麥舟六一堂茶圖詩臺諌上殿卷第九洞府投簡無垢語録冨鄭公封駮封押遺奏仕宦知止嫁女聚婦不受盤餐羣游嵩山二說侍兒小名關永堅花信風野艇郴州詞善博日勝毁通鑑猫食莫安排仲車雜著說食經行紀投獻取知池魚代王言彭門㑹下水船詞軍帥起復御府折食錢論帝姬卷第十吏文弊倖不置田宅春帖子唃厮囉爲文三易三經義捍海堰東坡僦宅張思齊詩不事佛果縣尉雪醅論蛇虺路巖報應春州客舎留題待遇僚屬黃巢姬妾王緒軍法柳氏家誡宅凶曾魯公更名虜程迂回賜章服黎洞白巾梅苑禍延過客烽火卷第十一郊壇瑞應太素脉爲學三多鄭固道除夕詩東坡親書常産繳私書府治回禄蟾芝樂語善能岀身臺評書劄過情九僧詩屬筆昭逹緃龜道昌相瑞鶴僊鄭俠封事二說卷第十二上饒古家朱墨本司馬田宅職名三等飼饑虎張守性膽水膽土張懹素火葬䍧牱行蟲飛蟲欄灘網王荆公墓虜攺沃州兩學記范文正復姓聚香鼎船妨立名互送不歸已響字
