body:
  text: 清波雜志卷第十一龍圖閣直學士提舉醴泉觀兼侍讀編修國朝會要詳定九域圖志編類御筆禮制局詳議官蔡攸奏臣伏奉聖恩差冬祀大禮陞輅執綏十一月五日陛下御玉輅自太廟出南薰門至玉津園伏蒙宣諭臣曰玉津園東樓殿重複是何處臣奏以城外無樓殿恐是齋宫陛下曰此去齋宫尚逺可迴顧見雲間樓臺殿閣隱隱數重既而審視其樓殿去地數十丈即知非齋宫俄頃陛下又謂臣曰見人物否臣即見有道流童子持幢幡節蓋相繼而出雲間人漸衆約千餘人皆長丈餘有輅車輿輦多青色駕者不類馬狀若龍虎及輦後有執大枝花數十相繼雲間日色穿透所見分明衣服眉目歷歷可識人皆戴冠或有類今道士冠而稍大者或若童子狀皆衣青紫黄緑紅或淡黄杏黄淺碧望之衣上或有繪繡或秉簡或持羽扇前後儀衞益衆約數千許人迴旋於東方稍南人物異常旌旗飛翻飄轉所持幢節高數丈非人丗所覩移刻或見或隱又頃乃隱不見此蓋陛下恪祗祀事追述三代作新禮器上體天道秉執元圭齋服盛明嚴恭寅畏天意感昭神明降格示現如此伏望宣付史館播告天下太師蔡京等奏乞率百僚稱慶明庭奉御筆依奏繼降詔曰朕嗣承丕基夙夜祗若惟道是憲惟上帝是承㳙選休辰恭修祀事備物盡志咸秩無文荷帝博臨如在其上旌旗輦輅冠服儀仗見於雲際萬衆咸睹惟天人之感通有形聲之相接靈承對越敢不祗欽可以其日爲天應節用端命于上帝以昭答於神休咨爾萬邦其體至意時政和三年也煇自省事即見丈人行談此事頗略兹得其詳因書以示欲知者先人云所書亦有潤色在當時已多有議之者豈亦出神道設教乎煇嘗見父友許志康宧論太素脉謂可卜人之休咎因及治平中京師醫僧智縁爲王荆公診脉言當有子登科甲之喜時王禹玉在坐深不然之明年雱果登第縁自矜語驗詣公乞文以爲寵公爲書曰妙應大師智縁診父之脉而知其子有成名之喜翰林王承㫖疑古無此縁曰昔秦毉和診晉侯之脉知其良臣將死夫良臣之命尚於晉侯脉息見之因父知子又何怪乎所書大略如此許云此非荆公之文特其徒假公重名矜衒以售其術爾洮河邊事亦甞召對智縁甞從王韶經理以官不就診御脉命徽宗嘗命米芾以兩韻詩草書御屏次韻乃押中字行筆自上至下其直如綫上稱賞曰名下無虛士芾即取所用硯入懷墨汁淋漓奏曰硯經臣下用不敢復進御臣敢拜賜又一日米回人書親舊有密於䆫隙窺其寫至芾再拜即放筆于案整襟端下兩拜爲學三多士皆知其說孫公莘老請益於歐陽公公曰此無他唯勤讀書而多爲之自工丗人患作文字少又懶讀書每一書出必求過人如此少有至者疵病不必待人指摘多作自見之孫書于座右鄭顧道侍郎居上饒享高壽煇不及識也嘗見其除夕小詩親筆可是今年老也無兒孫次第飲屠蘇一門骨肉知多少日出高時到老夫或問酴酥事於鮑胡德輝蒼梧志云次之類往往取其少長均平之義欽止鮑曰平屋謂之酴酥若今幕番江寓客趙叔簡編修宣和故家家藏東坡親書歷數帋蓋坡爲郡日當直司日生公事必著于歷當晩勾消唯其事無停滯故居多暇日可從詩酒之適欲將公事湖中了見說官閑事亦無乃秦少章所投坡詩蓋狀其實煇頃侍鉅公語及常産公云人生不可無田有則仕宦出處自如可以行志士則仰事俯育粗了伏臘不致喪失氣節有田方爲福蓋福字從田從衣雖得此說三十年竟無尺土歸耕老而衣食不足福基淺薄不亦冝乎舒亶知諫院言中書檢正張商英與臣手簡并以其壻王潙之所業示臣商英官居宰屬而臣職在言路事涉干請不敢隱黙其商英手簡二紙并潙之所業一冊今繳進詔商英落館閣校勘監江寧酒初舒爲縣尉坐手殺人停廢無盡爲御史言其才可用乃得改官至是乃爾士論惡之同時呂吉甫亦繳王荆公私書彎弓成俗亦何足多怪元祐間寳文閣直學士中大夫李文純知開封府廨字遺火降左中散大夫近歳臨安府治偶失所戒守臣自列貶秩免所居官其亦用此故事耶政和二年待制李譓進蟾芝上曰蟾動物也安得生芝聞大相國寺市中多有鬻此者爲玩物耳譓從臣何敢附㑹如此命以盆水漬之一夕而解竹釘故楮皆見於是責譓以罔上安置焉又己亥冬祀南郊方登壇樂作使人推數小車載火出于逺林左右爭獻言爲異指㸃閧然大司樂田爲押登壇歌壇上大呼曰田爲先見而上亦不責也時所謂祥瑞亦有類此者而蔡絛尚有山産碼碯水晶地布醴泉芝草夸大其父相業父子之罪通天亦何辱書蔡忠懷持正初任邠州理掾屬韓康公宣撫陜西喜其所撰樂語全用韓氏事薦之康公弟持國尹開封辟主左廂公事後尹劉公庠責蔡庭參蔡曰此禮起於藩鎮辟除掾屬輦轂之下比肩事主雖有故事亦不可用劉不能屈神宗聞而嘉之劉乃補外忠懷爲小官所守如此今州縣吏見長官典謁以例告違背禮制者多矣官闕執政奏除官上曰只用不肯一說神宗旣嘉確之不屈他日臺遂除確監察御史堦墀見開封尹者紹興十一年程克俊進呈乞以貢院所考合格宗室善能特令附正奏名殿試以示勸奬從之高宗曰天族之貴溺於燕安往往自䧟非法若以邦典繩之則非所以示叙睦之恩置而不問又無以立國家之法唯擇其好學從善者稍加崇厲以風厲其餘是亦教化之術也宗室取應賜出身自此始善能居無錫惠山與煇居爲鄰其後三四任州縣以選調終蘇丞相子容因臺評去位時左司諫虞䇿言蘇頌罷相臣備言職朝廷進退宰相宜有論列而臣竊自念頌於元豐年曽薦舉臣在臣之心誠恐近薄有犯風誼以此不敢入文字臣之尸職無所逃誅云云議者謂奏䟽自列略無隱情當是時風俗忠厚顧如此夷堅庚志書謝誠甫祖信任南床日論趙忠簡公不遺餘力而謝爲趙之上客豈逼於言責不暇顧私恩所見與虞異矣大父有手扎藥方乃用舊門狀紙爲䇿䙡見元祐間雖僧道謁刺亦大書謹祗候起居某官伏聽處分或云謹狀官稱略不過呼紹興初士大夫猶有以手狀通名止用小竹紙親書往還多以書簡莫非親筆小官於上位亦然自行劄子禮雖至矣情則反踈司馬温公嘗言與貴官書簡有采紙數過三皆不謹又云居處隨用所出紙札未嘗他求所書止一二幅丗多石本可見也非答書簡寫門刺未甞親筆硯之語歐陽公與梅聖俞書亦有日夕匆匆歐陽文忠公詩話國朝浮圖以詩名丗者九人故時有集號九僧詩今不復傳矣余少時聞人多稱其一曰惠崇餘八人忘其名煇昔傳九僧詩劒南希晝金華保暹南越文兆天台行肈沷州簡長青城惟鳳江東宇昭峨眉懷古并淮南惠崇其名也九僧詩極不多有景德五年直史館張亢所著序引如崇到長安人游曲江少草入未央深之句皆不載以是疑爲節本崇非但能詩畫亦有名丗謂惠崇小景者是也畫史紛紛何足數惠崇晚出吾最許荆公詩云耳數十年前僚屬有能文者監司郡守委作牋記遇有所囑必親作簡致叩教官被公牒撰應用文字亦親署名封達近時此禮俱廢但書司作承受傳導公牒則若常程行移至有牒請照會不請有違之語上官體皃益崇學士大夫浸失自重此其一也紹興間先人官鎮江時録參王敏功告殂帥守李茂嘉寳文率僚屬往其廨哭之近年豈復有此氣象舍弟昭達淳熈壬寅丞長洲沿檄往海鹽回程次吳江見岸旁漁舟取龜板用銛刀剜其肉最爲殘酷小人牟利忍於物命不恤也詢之一枚纔直一二錢惻然動心以一千得大小五百六十餘枚貯於竹籮度去漁舟差逺以數枚寘于版舟行旋取旋放蓋恐僕隷輩用力抛擲或墮沮洳中反傷其生半日方竟事到家其婦唐迎謂曰昨夢甲士數百人入門云荷官人見宥各聲喏而去殊不可曉初不知曾縱龜也告以故相與嘆息自爾凡遇鱗介鮮活者常取以善價俾相忘於江湖汔今毋怠無錫郷僧道昌蚤歳周遊諸方在廬山雲居因與人闘毆損左目值同𫀆授以相術乆乃得出藍之譽旋至都下出入貴人之門語多竒中族叔樞密方官正字昌一日語之旦夕當㩲法從時當國者深忌先傳除目力止之且云勿爲我累又言最下館職無攝禁近之理昌執益堅且刻只在今日方付一笑間兼權中書舍人命下叔祖侍郎婺倅滿秩造朝未暇干堂且歸嘉禾忽得召命叵測入國門昌曰通判必任言責亦痛詆其妄來日入對方知爲副端湯致逺薦對畢還寓舍昌先在焉理前語曰黨或不然則相書不可用也語未既報除察官先人罷饒幙有以敕局薦者議已定拘親嫌改乞江東幹官往叩昌昌曰必無成後三四年方得之劄子上而所主執政報罷後三年竟得江東漕幹有孫愿者赴部乞磨勘已放散矣昌曰以目下氣色觀之非但改官參差且恐折本孫大怒欲治之伺引見間部吏有所邀不從乃擿曾過房後歸宗在法合追所授恩澤有爲道地者與𥙷初等官繼從孫道夫少從之辟竟失志而卒前三說皆親見之孫又先人交承也昌後莫知所往櫻桃抄乳酪正雨厭肥梅風忺吹籜咸瞻格天閣見十眉環侍爭鳴絃索茶甌試瀹更良夜沉沉細酌問間生此日爲誰曾向玉皇案前持橐龜鶴從他祝壽未比當年隂功堪託天應不錯教公議細評泊自和戎以來謀國多少蕭曹衞霍柰胡兒自若唯守紹興舊約閩士朱耆壽字國箕爲秦伯和侍郎壽朱乆游上庠博洽能文一時諸公皆知之以累舉得官監臨安赤山酒年八十餘而終監安上門光州司理參軍鄭俠上䟽言去年大蝗秋冬亢旱今春不雨麥苖乾枯黍粟麻豆皆不及種五榖踴貴民情憂惶十九懼死逃移南北困苦道塗方春斬伐竭澤而漁大營官錢小營升米草木魚鼈亦莫生遂夷狄輕肆敢侮軍國皆由中外之臣輔佐陛下不以道以至於此臣願陛下開倉廩賑貧乏有司掊斂不道之政一切罷去庶幾早召和氣上應天心以延天下蒼生垂死之命君臣際會貴乎知心以臣之愚深知陛下愛養民庶如赤子故自即位以來一有利民便物之事無不毅然主張行之陛下之心亦願人人壽富而中外之臣略不推明陛下此心乃恣其叨懫劓割生民侵肌及骨使之困苦而不聊生夫陛下所存如彼羣臣所爲如此臺諫之臣黙黙具位而不敢言事至於規避百爲不敢居是職事凡百執事又皆貪猥近利使懷道抱識之士皆不欲與之言不識時然耶陛下有以使之然耶臣又見南征西伐皆以其勝捷之勢山川之形爲圖而來無一人以天下憂苦貨妻賣女父子不保遷移逃走困躓於藍縷拆屋伐桑爭貨於市輸官糴粟遑遑不給之狀爲圖而獻臣謹以安上門日所見繪爲一圖百不一及已可咨嗟涕泣而况於千萬里之外哉謹隨狀呈奏如陛下觀臣之圖行臣之言自今以往至于十月不雨乞斬臣於宣德門外以正欺君謾天之罪如少有所濟亦乞正臣越分言事之刑初不得即達乃作邊檄夜傳入禁中時永洛失律上方西顧檄至不敢遏秉燭啓封見圖畫飢民纍纍然莫測繼知爲諫䟽乃詔鄭俠勒停編管汀州視當時諸公所上封事雖最切直或謂凡人論天下利害所貴即悟主意罷行之若語言太訐使人主有不能堪而自取譴斥亦何補於事漢元帝欲御樓船薛廣德諫從橋曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣元帝不悅先歐張猛進曰乗船危就橋安聖主不乗危元帝曰曉人不當如是耶以是知諫有取於諷也俠字介夫福州人書既上或謂中有主之者故興詔獄俠改徙英州辭連馮京王堯臣丁諷等亦及責王安國除毁放歸田里皆繇呂惠卿與安國兄有隙故入其罪熈寧十年手詔英州編管人鄭俠元犯無上不道情至悖逆貸與之生已爲大惠可永不量移以有司用赦應量移鄂州故也於是刑房官吏皆𬒳責罰又一說上覽俠書遂詔學士承㫖韓維知開封府孫永體量免行錢三司使曾布體量市易又發常平倉及放商稅而青苗免役亦權罷催凡一十八事繼下詔曰朕於致治政失厥中自冬汔春愆陽爲沴四海之内被災者廣意朕之聽納不得於理歟獄訟非其情賦斂失其節忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟中外臣僚直言闕政詔文維所草也初司馬光自判西京留臺以歸絶口不論時事至是讀詔泣下乃復陳六事一青苗二免役三市易四邊事五保甲六水利云清波雜志卷第十一
