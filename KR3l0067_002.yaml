body:
  text: 清波雜志卷第二建炎元年五月一日髙宗即位赦書應蔡京童貫王黼朱勔李彥王師成談稹及其子孫皆誤國害民之人見流竄者更不收叙二日降手詔宣仁聖烈皇后保佑哲宗有安社稷大功姦臣懷私誣衊聖德著在國史以欺後世可令國史院別差官托實刋修播告天下其蔡卞邢恕蔡懋三省取旨行遣仍不得用建炎元年五月一日赦議者謂中興新政孰先於此抑推原禍亂之自云王黼一日在相國寺行香見蔡京以太師魯國公揭榜小立其下深有羡慕之色親厚者乘間叩之黼曰無他不謂元長有許大官職其人因言太宰若能承當一大事元長官職不難致黼識其意乃身任伐燕之責後亦致位太傅楚國公且許服紫花袍增益騶導并張青羅蓋塗金從物略與親王等寵遇將於京及夫事變適開封尹聶山有宿怨遣武吏追躡戕於雍丘輔固村民家取其首以獻以遇盜聞議者惜不與童貫輩明正典刑顧乃回枉如此同時蔡攸翛亦賜死翛聞命曰誤國如此死有餘辜又何憾焉乃飲藥而攸猶與不能决左右授以繩攸乃自縊而死或以靖康刑戮為疑識者云祖宗特不誅大臣爾若首禍賊黨罪惡顯著在天之靈當亦不赦也五十年前有通右府書稱樞密太尉蓋舊制文臣為樞密使皆帶檢校太尉東坡賀文潞公正位兵府書亦有太尉之稱官稱隨時攺易不可一槩論元豐前樞密院奏薦子弟皆補班行京城士庶舊通用青凉傘大中祥符五年唯許親王用之餘並禁止六年始許中書樞密院依舊用繖出入近時臣寮建議士庶用皂繖者不聞施行政和間亦詔非品官之家不許乘暖轎武臣任主兵差遣緣邊安撫官走馬承受並不得乘轎亦紹聖之制蒲宗孟左丞因奏書請官屬賞神宗曰所修書謬無賞宗孟又引例儀鸞司等當賜帛上以小故未答右丞王安禮進曰修書謬儀鸞司恐不預上為之笑賜帛乃得請率然一言而當於理諸疑獄當奏而不奏科罪如法不當奏輒奏者勿坐此法既行全活多矣元豐詔大理兼鞠獄事多上所付大理卿韓晉卿獨持平核實無所觀望人以不冤神宗知其材凡獄難明及事繫權貴者悉以委晉卿天下大辟請讞執政或以為煩將劾不應讞者晉卿曰聽斷求生朝廷之心也今讞而獲戾讞不至矣議者或引唐覆奏令欲天下庶獄悉從奏决晉卿曰法在天下而可疑可矜者上請此祖宗制曰今四海萬里一欲械繫待朝命恐罪人之死于獄多于伏辜者朝廷皆從之韓密州安丘人舊制沙門島黥卒溢額取一人投於海殊失朝廷寬貸之意乞後溢額選年深至配所不作過者移州神宗深然之著為定制乃馬默知登州日建明也應天下疑獄並具本末奏取勑裁此說既行凡有奏疑未嘗不免逮元豐八年詔自今天下州軍勘到彊盜情理無可憫刑名無疑慮輒敢奏聞者並令刑部舉駮重行朝典不得用例破條正與前說相反馬子約之父知登州乞以流海島溢額之卒移本州牢城以廣好生之德從之馬夢有告之者爾本無子且無壽上帝以爾請貸罪人賜一子且益壽云舊立扁榜必系以亭堂齊閣之名今或略去嘗見黃岡所刻東坡墨蹟一帖云新居在大江上風雲百變足娛老人有一書齊名思無邪齊若欲省文去下一齊字何不可者蓋亦隨時所尚爾自昔人士皆著帽後取便於戎服紹興丙子魏敏肅道弼二大政一日造朝預備衫帽朝退服以入堂蓋已得請矣一時驟更衣制力或未辦乃權宜以凉衫為禮習以為常乾道間王日嚴內相申請謂環一堂而圍座色皆淺素極可憎乞仍存紫衫至今四十年不攺前此仕族子弟未受官者皆衣白今非跨馬及弔慰不敢用士大夫於馬上披凉衫婦女步通衢以方幅紫羅障蔽半身俗謂之蓋頭蓋唐帷帽之制也籠餅蒸餅之屬食必去皮皆為北地風埃設舊見說汴都細車前列數人持水罐子旋灑路過車以免埃壒蓬勃江南階衢皆甃以磚與北方不侔客有言表章所用字有合回互處若危亂傾覆之類通朝士書如罪出憂去甚至以申謝為叙謝初以為過及見元祐一小說言蘇明允作權書歐陽公大竒之為攺書中所用崩亂十餘字奏于朝哲宗嘗書鄭谷雪詩於扇亂飄僧舍茶煙濕攺亂飄為輕飄房次律為永禪師白樂天海中山本朝陳文惠南庵歐陽公神清洞韓魏公紫府真人冨韓公崑崙真人蘇東坡戒和尚王平甫靈芝宫近時所傳尤衆第欲印證今古名輩皆自仙佛中去來然其說類得於夢寐渺茫中恐止可為篇什裝點之助東坡在海外語其子過曰我决不為海外人近日頗覺有還中州氣象乃滌硯焚香寫平生所作八賦當不脫誤一字以卜之寫畢大喜曰吾歸無疑矣後數日廉州之命至八賦墨蹟初歸梁師成後入禁中輝在建康於老尼處得東坡元祐間綾帕子上所書薄命佳人詩末兩句全用草聖筆勢尤超逸尼時年八十餘矣又於吕公經甫少卿家見所書傷春詞虞部文甫少卿父也二墨蹟婁經兵火而尚存誠冝珍祕吕乃申公之後紹興辛酉輝隨侍之鄱陽至南康揚瀾左蠡失舟老幼僅以身免小泊沙際俟易舟信步至山椒一寺軒名重湖梁間一木牌老僧指似是乃蘇內翰留題登榻觀之即八月渡重湖蕭條萬象踈秋風片帆急暮靄一山孤許國心猶在康時術巳虛岷峨千萬里投老得歸無詩也欲漫尚可讀僧云以所處深險人跡不到故留至今然律詩而用兩韻叩于能詩者曰詩格不一如李誠之送唐子方亦兩押山難字韻政不必拘也而坡歧亭詩凡二十六句而押六韻或云無此格韓退之有雜詩一篇二十六句押六韻輝平生四泛大江備嘗艱險共載生死係於沉浮之間每過龍祠薰爐瀝觴唯謹無屋宇但植一竿亦致冥幣於中流至小孤山謁廟見幡腳及花瓶中小青蛇盤結舉首蜿蜒者甚衆祝者云神今日在廟歆享而然歸舟夜夢入廟如儀且口占祝文既覺但記浩若川流儻不葬於魚腹赫然廟貌尚可薦於豚蹄一聮耳男子施敬於婦女男一拜婦答兩拜名曰夾拜古禮也今則不然古之男女皆跪詩曰長跪問故夫或問婦跪如何嘗聞海上之國僧尼婦人皆作男子拜拜尚不以為異則跪冝有之向在建康於鄰人狄似處見其五丗祖武襄公收儂智髙時所帶銅靣具及所佩牌上刻真武像丗言武襄乃真武神也又出使相判陳州吉身皆五色金花綾紙十七張暈錦褾袋犀軸紫絲網皆備後於友人歐陽俊處得其逺祖文忠公自初進擢至贈諡綸告一無遺者可謂故物不愧鄭公之笏兩家其能終保存耶武襄赴陳州不懌語所親曰青此行必死問其然曰陳州出一梨子號青沙爛今去本州青必爛死一時雖笑之未幾果卒初實戲談適㑹其死耳似云初無此說好事者為之或云當時狄為都人指目故為是無稽之言以為笑端判陳州竟因疑似熙寧攺元青子咨入對上問青征南有遺書否乃上平蠻記及歸仁鋪戰陳二圖上乃自為文遣使即其弟祭之其文具載實録信安孟王仁仲酷嗜法書名畫且能別真贋帥建康日知先人素從後湖蘇養直徵君游託移書求仇池故硯蘇答云抄掠之餘所存百骸九竅耳平生長物豈復一毫况仇池之尤物乎公殆索我於昔之隱几者也孟見之笑曰只是不肯見畀爾後數年黃山谷甥洪仲本託先人以一畫致于孟乃枯枿上一鷹實山房李公擇尚書故物補破處龍眠筆題作鍾隱米元章畫史云李後主號鍾山隱居疑後主筆也而名畫録自有鍾隱南唐人未知孰是或謂古畫必有對後聞併歸于孟氏鍾隱天台人隱於鍾山遂為姓名李方叔為趙德麟品德隅齊畫備書其藝之妙韓魏公領四路招討駐延安忽夜有攜匕首至卧內者乃夏人所遣也公語之汝取我首去其人曰不忍得諌議金帶足矣明日公不治此事俄有守陴者以元帶來納留之或曰初不治此事為得體卒受其帶則墮姦人計中矣公嘆非所及元豐間亦有守邊者一夕失城門鎖亦不究治但亟令易而大之繼有得元鎖來歸者乃曰初不失也使持往合關鍵蹉跌不相入較以納帶似得之豈大賢千慮未免一失乎延安剌客乃張元所遣元本華隂布衣使氣自負嘗再以詩干魏公公不納遂投西夏而用事逮王師失律于好水川元題詩于界上僧寺云夏竦何曽聳韓琦未是竒滿川龍虎輿猶自說兵機其不遜如此熊子復著九朝通略於康定元年書華州進士張源逃入元昊界詔賜其家錢米以反間之却用此源字嘉祐中修睦親宅神御殿歐陽文忠公言祖宗廟貌非人臣私家所宜有罷之宣和間朱勔在蘇州即私室建神御殿奉御容其中監司郡邑吏每朔望皆拜庭下熙寧間宗室魯王等亦建神御于本宫議臣謂諸侯不得祖天子公廟不設於私家今宗室有祖宗神御非所以明尊卑崇正統也宜一切廢罷從之近屬王宫尚有法禁小臣私室豈應得為徽宗召天下道術之士海陵徐神翁亦至神翁好寫字與人多驗蔡京得東明二字皆謂東明乃向日之方可卜富貴未艾後京貶死潭州城南五里外東明寺比之六賊獨免誅戮或謂以其當軸時建居養安濟漏澤貧有養病有醫死有葬隂德及物所致其然乎當是時有司觀望奉行失當於居養安濟皆給衣被器用専雇乳母及女使之類資給過厚常平所入殆不能支致侵擾行户宣和初復詔裁立中制未幾遂廢京之卒適潭守乃其仇數日不得殮隨行使臣輩藁葬於漏澤園人謂得其報此說止見於靖康禍胎記宣和間京師染色有名太師青者逮京之殮無棺木乃以青布條裹尸兹其䜟也京在相位偶在告未出有某氏先在兩家各生一子後二子入從爭欲迎母歸養未知適從事至朝廷執政無所處持以白京京曰此亦何難弟問其母願歸何處一言遂决又一歲户部缺郊費若干長二堂白京唯唯期逼申言之答以徐之旋聞下文思院鑄錢㨾亦叵測時冨商大賈在京識事者懲婁變鹽法之害亟以所蓄算請鈔旁不數日府庫沛然徽宗嘗出玉盞玉巵以示輔臣曰欲用此於大宴恐人以為太華京曰臣昔使虜見有玉盤盞皆石晉時物指以示臣謂南朝無此今用之上壽於理毋嫌徽宗曰先帝作一小臺財數尺上封者甚衆朕甚嘉之此器已就久矣懼人言復興京曰事茍當於理人言不足恤也陛下當享天下之養區區玉器何足道哉其不能納忠大率如此京懷姦固位婁被逐而不去王黼切忌之百方欲其去乃取旨遣童貫偕其子攸往取表京以攸被詔同至乃置酒留貫攸亦預焉京以事出不意一時失措酒行自陳曰京衰老宜去而不忍遽乞身者以上恩未報此二公所知也時左右聞京併呼其子為公莫不竊笑欲去宰輔取表自京始嘗考朝錯更漢令諸侯喧譁錯父聞之從穎川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口語多怨公何謂也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣朝氏危吾去公歸矣凡三呼其子為公史筆書之亦以表其失言蔡攸副童貫出師北伐有少保節度使與宣撫副使二認旗從于後次日執旗兵逃去二旗亦失之識者知為不祥既行徽宗語其父京曰攸辭日奏功成後要問朕覔念四五都知其英氣如此京但謝以小子無狀二人乃上寵嬪念四者閻婕妤也京得東坡表忠觀碑讀至天目之山苕水出焉謂坐客曰是甚言語初不知某之山某水出焉酈玄水經格也王荆公得表忠觀碑顧坐客曰似何人之文自又曰似司馬遷自又曰似遷何等文自又曰漢興諸侯王年表也邵溥公濟云遷死亡景帝武帝二紀禮樂等書三王世家乃元成間禇先生補作非遷之書也王荆公日録八十卷毗陵張氏有全帙頃曽借觀凡舊德大臣不附己者皆遭詆毁論法度有不便於民者皆歸於上可以垂耀後丗者悉已有之盡出其壻蔡卞誣罔其詳具載陳了齊瑩中四明尊堯集陳亦自謂豈敢以私意斷其是非更在後之君子審辨而已故神宗實録後亦多采目録中語增修章子厚為息女擇配久而未諧蔡因曰相公擇壻如此其艱豈不男女失時乎子厚曰待尋一箇似蔡郎者蔡甚慙王蔡造端矯誣雖歷千百年衆論藉藉如新矧同時之人宜乎議之不置孰謂蓋棺事始定耶前說輝得於叔祖元仲叔祖視政宣諸名公為輩行李丞相伯紀欲以諫官薦不就平生所著詩篇薌林向伯恭為之序熙寧五年詔賜新及第進士錢三千緍諸科七百緍為期集費進士諸科舊用甲次髙下率錢貧者或稱貸於人過於浮費至是始賜之後以為例清波雜志卷第二
