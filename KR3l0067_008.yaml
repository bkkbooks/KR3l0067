body:
  text: 皇祐初詔婦人所服冠髙毋得過七寸廣毋得踰一尺梳毋得踰尺以角為之先是宫中尚白角冠人爭效之號內樣冠名曰垂肩等肩至有長三尺者登車檐皆側首而入梳長亦踰尺議者以為服妖乃禁止之輝自提孩見婦女裝束數歲即一變况乎數十百年前樣製自應不同如髙冠長梳猶及見之當時名大梳裹非盛禮不用若施於今日未必不誇為新竒但非時所尚而不售大抵前輩治器物蓋屋宇皆務髙大後漸從狹小首飾亦然成都富春坊羣倡所聚一夕遺火犂明有釘一牌大書絶句詩於其上夜來燒了富春坊可是天公忒四行只恐夜深花睡去髙燒銀燭照紅粧乃伊洛名德之後號道山公子者所作又有小詞一編皆艷語輝嘗得其一啓乃代其弟上周彥約侍郎其略云惟曾祖受三天子聘賢之禮數在先朝為九老人受道之師承繼巢由之髙蹤辭䕫龍之盛舉惟君子之澤未斬而聖人之道必傳文采典重如此豈可以一時諧謔之跡而加訾議晏叔原著樂府黃山谷為序而其父客韓宫師玉汝曰願郎君捐有餘之才崇未至之德前哲訓迪後進拳拳如此為後進者得不服膺而書紳賀方回柳耆卿為文甚多皆不傳於丗獨以樂章膾炙人口大抵作文豈可不謹陶尚書穀奉使江南恃才凌忽議論間殆應接不暇有善謀者選籍中艷麗詐為驛卒孀女布裙荆叉日擁篲於庭榖一見喜之久而與之狎贈以長短句一日國主開宴立妓於前歌所贈郵亭一夜眠之詞榖大慙沮滿引致醉頓失前日簡倨之容歸朝坐此抵罪文潞公帥成都有飛語至朝廷遣御史何郯因謁告俾伺察之潞公亦為之動遍詢幕客孰與御史密者得張俞字少愚者使迎于漢州且攜營妓名王宫花者往僞作家姬舞以佐酒御史醉中取其領巾題詩云桉徹梁州更六么西臺御史惜妖嬈從今改作王宫柳舞盡春風萬萬條至成都此妓出迎遂不復措手而歸二事切相類一說王宫花一名楊臺柳詩首句云蜀國佳人號細腰何字聖從亦蜀人也大觀二年詔大相國寺慧林禪院長老元正坐化並無衣鉢闕葬送之用賜絹三百匹錢三百貫賜寂照之塔仍間度一僧浮屠示寂寸絲不掛亦安用爾許縑帛時方崇道教詔道流叙位在僧之上元正何人而膺此優典頃歲兒女合卺之夕壻登髙座賦詩催粧為常禮後皆略去京師貴游納壻類設次通衢先觀人物嶽母忽笑曰我女如菩薩却嫁箇麻胡子謂其多髯也殆索詩乃大書曰一雙兩好古來無好女從來無好夫卻扇捲簾明㸃燭待交菩薩看麻胡一座傳觀烘堂蓋壻亦不凡也嘗得其姓名今失記輝居建康春晚赴張德共㑹於西園呼數輩為侑酒酣忽有傳府命呼其人時張安國開府方兩日其人既去求自解之說衆謂但以實告况社中二客不至必留鈴齊翌旦詢之如所料初歌者既去坐客駱適正即席賦詩云花隨春盡覔無痕尚續餘歡索侑尊一曲未終人已去西園燈火欲黃昏輝嘗賡和不記也逮今一丗西園賔主無一在者獨輝蒼顔華髮羈寓西湖上舊事無人可共論為之一歎淳化宰相張公齊賢布衣時嘗春游嵩嶽醉卧巨石上夢人驅羣羊於前曰此張相公食料羊也既貴每食數斤猶未厭飫健啖丗無比者此與唐贊皇李德𥙿夢人謂平生合享萬羊之兆符合以是知貴人鼎養豐厚冥冥中自有定數貧儒豈可不安藜藿之分王荆公與宋次道同為三司判官時次道出其家藏唐詩百餘篇託荆公選其佳者荆公乃僉出俾吏抄録吏每遇長篇字多倦於筆力隨手削去荆公醇德不疑其欺也今丗所傳本乃羣牧吏所刪者歐陽公歸田録未出而序先傳神宗宣取公時致仕居穎以其間紀述有未欲廣者因盡刪去又患其文太少則雜以戲笑不急之事元本未嘗出廬陵集所載上下才兩卷乃進本也近時曽公端伯亦編皇宋百家詩選去取任一己之見雖非捃托詆訶其間或未厭衆論且於歐公荆公東坡詩皆不載雖曰用唐詩選韓杜李不與編故事其亦大名之下不容有所銓擇耶吕居仁圖江西宗派凡二十五人議者謂陳無已為詩髙古使其不死未甘為宗派若徐師川則固不平列在行間韓子蒼曰我自學古人夏均父亦耻居下列一時品弟尚爾紛紛矧隨好惡筆削篇章示已鑒裁之明豈免議論得數篇即撰小序以刋行旋悟踈略欲删去而不曽帥江陵日叔祖為參議官親見亟欲詩選成僅下列為非輝亦見前輩云東萊自言宗派本無銓次及吳虎臣漫録書居仁作圖時均父沒已六年耻在東萊者創此說以蓋時論非本語也後人妄謂有所髙下且悔少作是皆黨京畿轉運司奏收到太和山水晶大小四千餘磈雍州等處産金寶共收到金二千四十六兩數內採到生大黃金不經烹煉者汝州産碼瑙二萬五千斤一塊重二十一斤五兩並宣付史館時政和四年也又潭州益陽縣蓮荷埸掘得金四塊總計一千七百八兩方崇飾祥瑞之際地不愛寶闡珍以表極治其盛如此鄭穆字閎中閩士所尊四先生鄭其一也元祐初為國子祭酒久而請老太學諸生數千人狀詣司業又詣丞相府請留不報以待制奉祠將行公卿大夫多以詩贈之三學之士皆為詩且出祖汴東門外三獻酒再拜堂下辭訣而去觀者歎息輝幼從合肥王公助學王與鄭中表親有一編目歸榮乃送行詩也復未見此本人少則髮黑老則髮白久則黃人少則膚白老則膚黑久則黯若有垢然髮黃而膚為垢故曰黃耇見王充論衡而今韻略耇字下亦注老人靣若垢為耇崇寧三年駕幸金明池乘烏馬還內道路安平賜名龍驤將軍艮嶽一石髙四十尺名神運昭功宣和五年朱勔自平江府造巨艦載太湖大石一塊至京以千人舁進勔被賞建節石封盤囤侯方務德侍郎帥紹興赴召士人姚某以書投誠其略曰某流落江湖二十年兄弟異立未能成家重以場屋蹉跌遂失身於倡館馬慧歲月滋久根深蒂結生育男女於義有不可負者兼渠孑然一身無所依倚處性不能自立萬一有叛此盟終身廢棄存亡或未可保不於侍郎還朝之日得遂脫身從良他日不困此門戶中不唯無以釋兒女之恨而某亦從此銷縮區區欲望矜憐使魚鳶之屬川泳雲飛侍郎之德大矣敢不下拜方書其後云姚某解元文詞英麗早以俊稱杯酒留連遂致於亡反露由衷之懇不愧多言遂成家之名何愛一妓韓公之於戎昱既徇所求竒章之望牧之更冝自愛能從其請可見寬厚之德且引事切當韓滉鎮潤州戎昱典屬郡昵一妓或言于韓韓取戎不敢留臨别作小詞曰好在春風湖上亭柳絲藤蔓繫人情黃鸝久住渾相戀欲别頻啼三兩聲韓聞即歸之蓋用此事從叔知和隨侍官九江嘗以詩見吕東萊居仁後以書請教答云廬阜只尺讀書少休必到山中所與游者誰也古人觀名山大川以廣其志思而成其德方謂善游太史公之文百氏所宗亦其所歷山川有以增發之也惜其所用止在文字間若使志於逺者大者雖近逐游夏可也又為作求諸已齊詩見集中知和嘗尉吳江作垂虹詩話語輝未有序輝言若以所得東萊帖冠于首何用他求從之復著垂虹賦為人稱賞蓋得少小師尊前輩之力惜年未及中病廢而卒政和五年四月燕輔臣於宣和殿先御崇政殿閲子弟五百餘人馳射挽强精鋭畢事賜坐出宫人列于殿下鳴鼓擊柝躍馬飛射翦柳枝射繡毬擊丸据鞍開神臂弓妙絶無倫衛士皆有愧色上曰雖非婦事然女子能之則天下豈無可教臣京等進曰士能挽强女能騎射安不忘危天下幸甚見從游宣和殿記近丗州郡類以名賢昔嘗臨蒞繪像以章遺愛數十百年後何緣得其容貌之真但畫衣冠題爵位姓名耳東坡送周正孺知東川詩落句云為君掃棠隂畫像或相踵蓋蜀中太守無不畫像者頃王顯道守吳門日孫仲益居毗陵以嘗牧是邦遣騎求其傳神併復齊雲樓舊觀孫謝之有嘗讀國史錢惟演作樞密直學士題名記黜冦萊公為逆凖不書時有蔡齊斥其妄如覿無狀公乃肯收之之語此紹興間事也錢惟演作樞密直學士題名記附麗丁謂輒去冦凖姓氏云逆凖公嘗言于仁宗曰冦凖社稷之臣忠義聞於天下豈可為姦黨所誣哉遂令磨去見公行狀范文正公在睢陽遣堯夫到姑蘇般麥五百斛堯夫時尚少既還舟次丹陽見石曼卿問寄此久如曼卿曰兩月矣三喪在淺土欲葬之而北歸無可與謀者堯夫以所載麥舟付之單騎兼程取捷徑而歸到家拜起侍立良久文正曰東吳見故舊乎曰曼卿為三喪未舉方留滯丹陽時無郭元振莫可告者文正曰何不以麥舟與之堯夫曰已付之矣大夢行當覺百年特未滿遑哀已逝人長眠寄孤館念我同年生意長日月短鹽車困騏驥烈火廢圭瓉後生有竒骨出語已精悍蕭然野鶴姿誰復識中散有生寓大塊死者誰不窽嗟君獨久客不識黃土暖推衣助孝子一溉滋湯旱誰能脫左驂大事不可緩此詩東坡為李憲仲作憲仲之子豸坡得梁吉老十縑百絲舉以􅉠之度是詩出當多有助之者又作章默詩意益深辭益哀今之人親喪未舉豈免求哀于時若假是名因以為利或廣求以侈其葬恐失脫驂之本意也歐陽文忠公父鄭公任綿州推官日生文忠後有謝固者居是官於治所之左葺一堂號六一唐子西賦長篇有即彼生處所館之與周旋之句或云司馬溫公父待制公守浮光日生溫公故名取輝耀之義自昔功施於民則祀之矧巨公盛德功在社稷百丗宗仰者乎或云郡舊有香火之奉今守土者得不侈大祠宇以永其傳若弟以名勢所臨在仕者獻諛取媚如紹興間黃州為時相建瑞慶堂是也謝固一為談望子西自有兩說先人三弟季字德紹與輝同庚同月輝先十三日自幼從竹林遊德性敏而靜中年後文筆加進嘗題玉川碾茶圖絶句云獨抱遺經舌本乾笑呼赤腳碾龍團但知兩腋清風起未識捧甌春笋寒頗有唐人風製死已十年遺藁失於收拾但宗族間傳得一二舊說臺諫當上殿未有題目五更不寐平生親舊一一上心蓋唯親舊可得其詳庶免風聞之誤是雖戲語嘗親見之紹興間某任言責欲論一人未得出處不叶公議與之齊者偶一鄉人來訪私謂得其人矣叙契闊接殷勤甚歡其人大喜過望意汲引可必也越兩日章疏上乃同前欲論者降㫖即日押出國門寧逢惡賔莫逢故人又云故人相逢不吉則凶清波雜志卷弟八
