front:
  text: 清波雜志卷第八浯溪中興頌碑自唐至今題詠實繁零陵近雖刋行止㑹粹已入石者曽未暇廣搜而博訪也趙明誠待制妻易安李夫人嘗和張文潜長篇二以婦人而厠衆作非深有思致者能之乎五十年功如電掃華清花柳咸陽草五坊供奉鬪雞兒酒肉堆中不知老胡兵忽自天上來逆胡亦是姦雄才勤政樓前走胡馬珠翠踏盡香塵埃何為出戰輒披靡傳置荔枝多馬死堯功舜德本如天安用區區紀文字著碑銘德真陋哉乃令神鬼磨山崖子儀光弼不自猜天心悔禍人心開夏商有鑒當深戒簡䇿汗青今具在君不見當時張說最多機雖生已被姚崇賣君不見驚人廢興傳天寶中興碑上今生草不知負國有姦雄但說成功尊國老誰令妃子天上來虢秦韓國皆天才花桑羯鼓玉方響春風不敢生塵埃姓名誰復知安史健兒猛將安眠死去天尺五抱甕峯峯頭鑿出開元字時移勢去真可哀姦人心醜深如崖西蜀萬里尚能反南內一閉何時開可憐孝德如天大反使將軍稱好在嗚呼奴輩乃不能道輔國用事張后尊乃能念春薺長安作斤賣頃見易安族人言明誠在建康日易安每值天大雪即頂笠披蓑循城逺覽以尋詩得句必邀其夫賡和明誠每苦之也輝嘗欲裒今昔名人所賦廬山髙明妃曲中興頌用精紙為軸丐工字畫者隨意各書一篇後志姓字歲月常常披展為醒心明目之玩竟未克成是極易辦人必樂從特坐因循耳易安父文叔元祐館職印板文字訛舛為常蓋校書如掃塵旋掃旋生葛常之侍郎著韻語陽秋評詩一條云沈存中云退之城南聮句竹影金鎖碎者日光也恨句中無日字爾余謂不然杜子美云老身倦馬河堤永踏盡黃榆緑槐影亦何必用日字作詩正要如此葛之說云爾輝考此詩乃東坡召還至都門先寄子由首云老身倦馬河堤永踏盡黃槐緑榆影終篇皆為子由設當是誤書子瞻為子美耳此猶可以意㑹若麻沙本之差舛誤後學多矣劉季孫初以左班殿直監饒州酒題小詩於治所壁間呢喃燕子語梁間底事驚回夢裏間說與旁人應不解杖藜攜酒看芝山時王荆公任本路憲桉行見之大加稱賞遂檄權本州教授後葉石林特著於詩話中芝山乃饒州近城僧寺後池陽刻本乃改芝山為前山一字不審乃失全篇之意抑見自昔右列亦可承師儒之乏
