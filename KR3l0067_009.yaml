body:
  text: 清波雜志卷弟九天下名山洞府河陽府平陽洞台州赤城山玉京洞江寧府華陽洞舒州灊山司真洞杭州大滌洞鼎州桃源洞常州張公洞南康軍廬山詠真洞建州武夷山升真洞南嶽朱陵洞江州馬當山上水府太平州中水府潤州金山下水府杭州錢唐江水府河陽濟瀆北海水府鳳翔府聖湫仙遊潭河中府百文泓龍潭杭州天目山龍潭華州車湘潭初朝廷以每歲投龍簡而洞府多在僻逺處其齎送祭醮之且頗以為擾天聖間下道録院定歲投龍簡几二十處餘皆罷之輝四十年前於馬當龍祠廊廡下見一碑刻投龍處所視此數頗有增益碑隂載祭享牲牢香幣樂節為詳乃元豐間江州建立者再過之則亡張無垢貶南安凡十有四年寓處僧舍未嘗出門戶其一話一言舉足為法警悟後學宏矣其甥于恕裒集語録十二卷既已刋行其間論語絶句讀者疑焉蓋公自有語解亦何假此發明奧義嘗叩公門人郎曄曄云此非公之文也語録亦有附會者唐制唯給事得封還詔書富鄭公知制誥日劉從願妻遂國夫人王蒙正女也既奪封罷朝謁久之復其國封公乃繳還詞頭其命遂寢中書舍人繳詞頭蓋自鄭公始封實録本傅不載止見於蘇轍龍川别志熊克所著九朝通略書冨弼繳還遂國之事有礙於理亦恐所傳或致訛舛富鄭公薨司馬溫公范忠宣來弔哭公之子紹庭泣曰先公有自封押章疏一通殆遺表也二公曰當不啓封以聞既曰遺表自有常式恐難以元封押進御封可也押可乎東坡作公神道碑止云手封遺表使其子上之丗莫知所以言者袖中諫草朝天去歐陽公固嘗議之祿豈須多防滿則退年不待暮有疾便辭仕者若守此戒則不殆不辱可全始終進退之節頃見洪慶善書此語於座屏然晚有南荒之謫蓋亦昧於勇退士大夫能明哲保身以全終始者寡矣嫁女須勝吾家者娶婦須不若吾家者或問其故曰嫁勝吾家則女之事人必欽必戒娶婦不若吾家則婦事舅姑必執婦道安定胡翼之云安定為此説必輝見老先生言此説皆得所歸而然歟有謂豈其男女昏嫁用石守道為舉子時寓學於南都其固窮苦學丗無比者交遊間嘗以盤餐遺之石謝曰甘脆者亦介之願也但日饗之則可若止得一餐則明日何以繼乎朝饗膏粱暮厭粗糲人之常情也所以不敢當歸之貧樂簞瓢賢矣哉嘗聞富鄭公辭疾歸第以俸劵還府府受之程伊川正叔曰受之固無足議還者亦未為得也留之無請可也或曰餽食美意也受而不食可也却之近名也歐陽公為西京留守推官事錢思公一日羣遊嵩山取潁陽路歸暮抵龍門雪作登石樓望都城次忽煙靄中有車馬渡伊水者既至乃思公遣厨傳歌妓且致俾從容勝賞毋遽歸之意思公既貶漢東王文康公晦叔為代一日訝幕客多遊責曰君等自比冦萊公何如萊公尚坐奢縱取禍衆不敢對歐公取手板起立曰以某論之萊公之禍不在杯酒在老不知退爾四座偉之是時文康年已髙為之動故歐公六十五即休致門生或有言公德望為朝廷倚重且未及年豈容遽去公答曰某平生名節為後生描畫盡唯有早退以全晚節豈可更被驅逐乎以是知公未老告歸蓋以文康公為戒且踐疇昔之言也或云歐公遊潁陽見山中石壁上丹書神清洞即此時也書祠時尚諸公皆以王事從嵩山之遊謝有二書抵梅聖俞歷部貟外郎直集賢院通判河南府謝希深絳與歐陽篇時明道元年九月也敘登覽之勝梅答以長一小説名默記內一條云尹師魯性髙而𥚹在洛中與歐梅諸公同遊嵩山師魯曰遊山須是帶得胡餅爐來方是遊山諸公咸謂遊山貴真率豈有此理諸公羣起而攻之師魯知前言之謬而不能勝諸公遂引手扼吭諸公爭救之乃免輝見前輩云一時失言有所不免若曰愧而扼吭無是理也著默記者亦不當書此洪駒父集侍兒小名三卷王性之續一卷好事者復益所未備雖曰擇之不精采托未盡亦足為尊爼諧謔之助士大夫昵裙裾之樂顧侍巾櫛輩得之惟艱或得一焉不問色藝如何雖資至凡下必極美稱名浮於實類有可笑者豈故矜衒特償平日妄想不足則夸爾或謂若把西湖比西子淡粧濃抹揔相冝揔冝之名為佳特恐無敢承當者公與洪玉父共成此性之之子明清云先語當得其實輝傳本誤矣編非駒父之所續也意此趙忠簡公秉政日使臣關永堅亦西人趨承云久乃丐官淮上貧不辦行欲貨息女公憐之隨給所須永堅乞納女公卻之請力不得已姑留之後永堅解秩還公一見語之爾女無恙永堅謂宿逋未償公笑不答且助資送費囑求良配遂歸監平江梅里鎮宗室汝霖女言雖纍年日侍丞相巾櫛及嫁尚處也汝霖與知泗州王伯路厚語其詳王云前輩於此等優為之特今之人為難能司馬溫公曽魯公各有自似此一事傳於丗文多不載江南自初春至首夏有二十四畨風信梅花風最先練花風居後輝少小時嘗從同舍金華潘元質和人春詞有捲簾試約東君問花信風來第幾畨之句潘曰宫詞體也語太弱則流入輕浮又嘗和人蠟梅詞有生怕凍損蜂房膽瓶湯浸且與溫存著規警如前朋友琢磨之益老不敢忘潘墓木拱矣山谷云野艇恰受兩三人别本作航航是大舟當以艇為正今所謂航船者俗名輕舠如航湖航海亦為常談沚之句所謂三翼皆巨戰船非輕舟也張景陽七命載在文選有泛三翼泛中秦少遊發郴州反顧有所屬其詞曰霧失樓臺月迷津渡桃源望斷無尋處可堪孤館閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自繞郴山為誰流下瀟湘去山谷云語意極似劉夢得楚蜀間語淚濕闌干花著露愁到眉峰碧聚干闌乃張泌思越人詞黛眉愁聚春碧淚臉也見鄴侯家傳愁到眉峰碧聚此恨平分取更無言語空相覷斷雨殘雲無意緒寂寞朝朝暮暮今夜山深處斷魂分付潮回去毛澤民元祐間罷杭州法曹至富陽所作贈别也因是受知東坡語盡而意不盡意盡而情不盡何酷似少遊也乾道間舅氏張仁仲宰武康輝往見留三日遍覽東堂之勝蓋澤民嘗宰是邑於彼老士人家見别語墨迹蘇東坡云如人善博日勝日負王荆公改作日勝日貧坡之孫符云元本乃日勝日貧吕正獻尤不喜人博有勝則傷仁敗則傷儉之語了齋陳瑩中為太學博士薛昻林自之徒為正録皆蔡卞之黨也競尊王荆公而擠排元祐禁戒士人不得習元祐學術卞方議毁資治通鑑板陳聞之因䇿士題特引序文以明神宗有訓於是林自駭異而謂陳曰此豈神宗親製耶陳曰誰言其非也自又曰亦神宗少年之文耳陳曰聖人之學得於天性有始有卒豈有少長之異乎自辭屈愧嘆遽以告卞卞乃密令學中敞髙閣不復敢議毁矣毁通鑑非細事也諸公未有紀之者止著於了齋遺事中國子監舊有安定胡翼之祠紹聖初自為博士聞于朝徹去客言蘇伯昌初筮長安獄掾令買魚飼貓乃供豬襯腸詰之云此間例以此為貓食乃一笑留以充庖同寮從而遂日買貓食蓋西北品味止以羊為貴詔賜楚州孝子徐積絹三十匹米三十石積從胡爰學一見異待之嘗延食中堂二女子侍立將退積問曰門人或問見侍女否何以答之爰曰莫安排積聞此言省悟所學頓進此假不但見於諸公紀聞亦載在哲宗實録乃元豐八年事也豈警後學要妙在莫安排三字故史臣從而書焉徐字仲車仲車雜著數十條臨川山陽板行其一云陳力就列不能者止近丗拜官徒為飾詞已足耻矣而朝廷又為之法曰至某官乃得辭免是教人為偽也其兩府有除拜未受命必先押入其名已不正蓋賢者以禮進以義退既可押入必可押出此固然矣但立法有素豈易頓革柄臣為國具瞻既膺大拜不應偃然即當其任故三辭再辭次及從官臺諫一辭而已此豈由衷特拘以法其不應辭者豈官微任輕進不係時之重而然歟兩府初除固已受命特未受告耳凡降旨日下供職者皆未受告也食無精糲飢皆適口故善處貧者有晚餐當肉之語輝家與宗室通婚姻常赴其招家家類留意庖饌非特調芼應律令且三字爛熱少爛則易於咀嚼熱則不失香味少則俾不屬饜而飫後品輝頃出疆自過淮見市肆所售羊邉甚大小者亦度重五六十斤蓋河北羊之胡頭有及百斤者驛頓早晚供羊甚腆既苦生硬且雜以蕪荑醬臭不可近若用前二説製以餉客豈不快屠門之嚼哉王荆公解美字從羊從大謂羊之大者方美而東坡亦有翦毛胡羊大如馬誰記鹿角腥盤筵之句山谷簡何斯舉治具待客亦謂軟爛則宜老人豐潔則稱佳客今日蔬食起權輿之嘆説食經而偶及此輝自四十以後凡有行役雖數日程道路倥偬之際亦有日記以先人晚苦重聼如幹蠱次敘旅泊淹速親舊安否書之特詳用代縷縷之問記向年貨田句金不遂取塗三茅得新刋山圖而歸濡滯良久殊失倚門之望因思昔淵才久出其家日望其歸歸止攜一布囊人謂其間必珍貨也後數日會親戚啓囊乃歐陽公新修五代史藁數帙李庭圭墨一笏而已輝用此書于日記後先人為之一笑自隆興癸未至紹熙辛亥恰一丗伏書泫然王立之詩話書張宗古自堂後官守登州祈雪獲應一判官以詩為賀宗古曰玩我欲繳進為人勸止先人任饒幕與邵武黃堅叟為代一日郡宴鄱江樓黃作木蘭花詞上别乘有監郡風流歡洽之語亦貽怒繳申郡牒問風流歡洽實迹黃歷考古今風流歡洽出處辨答甚苦嘗取吏案以觀而得其詳要知投獻本求知又當視其人如何庶不返致桉劔特未知宗古所謂玩我何説其亦錦衾爛兮之類乎張無盡嘗作一表云魯酒薄而邯鄲圍城門火而池魚禍上句出莊子下句不知所出以意推之當是城門失火以池水救之池竭而魚死也廣韻池字韻注云池水沼也古有姓池名仲魚者城門失火燒死諺云城門失火殃及池魚白樂天詩有火發城頭魚水裏救火竭池魚失水初不主姓名之説然廣韻所載當有所據詞頭代王言賞功罰罪若雷風鼓舞天下要當采公論載于訓詞以昭示懲勸某除某官若其人非素所與者必微寓詆誚於一二字中審其人不應此除曷不循繳還之制顧假命令以快我之好惡其可乎朝無咎貶玉山也過彭門而陳履常廢居里中無咎出小鬟舞梁州以佐酒履常作小闋木蘭花云娉娉裊裊芍藥梢頭紅樣小舞袖低垂心到郎邉客已知金尊玉酒勸我花前千萬夀莫莫休休白髮簮花我自羞無咎云疑宋開府鐵心石腸及為梅花賦清便艷發殆不類其為人履常清通雖鐵心石腸不至於開府而此詞清便艷發過於梅花賦矣元豐己未明略無咎同登科明略所遊田氏姝麗也一日明略邀無咎晨過田氏田氏遽起對鑑理髮且盻且語草草粧掠以與客對無咎以明略故有意而莫傳也因為下水船一闋上客驪駒至鸚喚銀屏睡起困倚粧臺盈盈正解螺髻鳳叉墜繚繞金盤玉指巫山一假雲委半窺鑑向我橫秋水斜領花交鏡裏淡拂鉛華匆匆自整羅綺斂眉翠雖有愔愔密意空作江邊解珮頃在上饒得此説於朝族無咎跋云大觀庚寅四月十三日伯比季良無咎集國東之逆旅話此四事季良云可書也伯比季良當是羣從風流醖藉寓諸樂府雖曰纎塵不妨遊戲於杯酒間餘一説乃陳襲為錢唐妓周子文作四詩詞洪內相已載在夷堅庚志語皆合餘一未詳軍帥丁憂詔起復逮服闋猶以起復二字入銜或曉之答曰自拋了娘子却加得此官二年未曽遷轉又一輩銜內必帶宜差二字有㑭除去乃云元被受差劄上帶下來怎敢擅除一添差酒官不釐務堅要供職人亦語之在法只合間坐請料錢其人言朝廷令某不離務趂辦課利豈敢間坐請他料錢三者可輔笑林之遺舊制御厨折食錢凡十一等第一等舊折八十餘千紹興初減半餘遞減有差至第十一等舊折三十千亦損其半然尚宫內人赴景靈宫酌獻却係臨安府依格饌造食味每分白肉胡餅湯肉粉雜飣炊作炒肉煮菜羮飯軟肉所破料止羊肉十三兩麵五兩盝豆粉二兩米五合薪炭之屬凖此其儉如此或云乃承平舊制雖御厨末等折食則例亦不致是之窘也建炎初臣僚論帝姬或者謂非姓氏之姬乃姬侍之姬此尤不可豈有至尊之女而下稱姬侍乎若以謂避忌政和間主字乃主簿主書之主非國主家主之主也先是主字一切除去民間有無主之説又言姬者飢也亦用度不足之讖乃詔改正乃政和二年蔡京三入相時建請改公主為帝姬郡主為宗姬縣主為族姬議者謂周姬猶齊薑宋子也是使國女改從周姓故靖康初悉罷之清波雜志卷第九
